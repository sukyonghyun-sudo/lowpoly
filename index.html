    // ===== Zombie AI: detection =====
    function distanceToPlayerXZ(z) {
      if (!characterObj) return Infinity;
      const dx = z.model.position.x - characterObj.position.x;
      const dz = z.model.position.z - characterObj.position.z;
      return Math.sqrt(dx * dx + dz * dz);
    }

    function hearingRange() {
      // Returns how far the player is currently making noise
      if (!characterObj) return 0;
      if (isAttacking) return AI.HEAR_ATTACK;
      if (isSneaking) return AI.HEAR_SNEAK;
      const running = keysPressed['ShiftLeft'] || keysPressed['ShiftRight'];
      const moving = keysPressed['KeyW'] || keysPressed['KeyA'] || keysPressed['KeyS'] || keysPressed['KeyD']
                  || keysPressed['ArrowUp'] || keysPressed['ArrowDown'] || keysPressed['ArrowLeft'] || keysPressed['ArrowRight'];
      if (!moving) return 0;
      return running ? AI.HEAR_RUN : AI.HEAR_WALK;
    }

    function canSeePlayer(z) {
      const d = distanceToPlayerXZ(z);
      if (d > AI.SIGHT_RANGE) return false;
      // Check angle: vector from zombie to player vs zombie's forward
      const dx = characterObj.position.x - z.model.position.x;
      const dz = characterObj.position.z - z.model.position.z;
      // Zombie forward (in world): rotate (0,0,1) by model rotation y? In Three.js,
      // a model facing the +Z direction at rot.y=0 — but our zombies were placed
      // with lookAt(player), so forward should point at player initially. Use the
      // current rotation.
      const rotY = z.model.rotation.y;
      const fwdX = Math.sin(rotY);
      const fwdZ = Math.cos(rotY);
      // Dot product gives cos(angle)
      const len = Math.sqrt(dx * dx + dz * dz);
      if (len < 0.001) return true; // overlapping
      const dot = (dx / len) * fwdX + (dz / len) * fwdZ;
      const angle = Math.acos(Math.max(-1, Math.min(1, dot))) * 180 / Math.PI;
      return angle < AI.SIGHT_CONE_DEG;
    }

    function canHearPlayer(z) {
      const d = distanceToPlayerXZ(z);
      return d < hearingRange();
    }

    // ===== Zombie AI: alert spreading =====
    function alertNearbyZombies(z, sourceState) {
      for (const other of zombies) {
        if (other === z || !other.model.visible) continue;
        if (other.aiState === 'dead') continue;
        const dx = other.model.position.x - z.model.position.x;
        const dz = other.model.position.z - z.model.position.z;
        if (dx * dx + dz * dz < AI.ALERT_SPREAD * AI.ALERT_SPREAD) {
          if (other.aiState === 'idle') {
            // Newly alerted zombies also scream first, then chase
            if (other.actions['Scream']) {
              other.aiState = 'scream';
              other.screamTimer = AI.SCREAM_TIME * 0.6; // shorter than original
              playZombieAnim(other, 'Scream', { loop: THREE.LoopOnce, clamp: true, force: true });
            } else {
              other.aiState = 'chase';
              playZombieAnim(other, 'Running');
            }
          }
        }
      }
    }

    // ===== Zombie AI: damage from player attack =====
    // Track combo target so player doesn't spin to a different zombie mid-combo
    let _comboTarget = null;
    let _comboTargetTimer = 0;
    window._getComboTargetTimer = () => _comboTargetTimer;
    window._tickComboTargetTimer = (dt) => { if (_comboTargetTimer > 0) _comboTargetTimer -= dt; };
    window._setComboTarget = (z) => { _comboTarget = z; _comboTargetTimer = 1.5; };
    window._getComboTarget = () => _comboTarget;
    // Every frame during an attack, force player to keep facing target.
    // Without this, the mixer or movement code can rotate the player away
    // from the zombie they're trying to hit.
    window._lockFaceTarget = () => {
      if (!characterObj || !_comboTarget) return;
      if (_comboTargetTimer <= 0) return;
      if (!_comboTarget.model.visible || _comboTarget.aiState === 'dead') return;
      const dx = _comboTarget.model.position.x - characterObj.position.x;
      const dz = _comboTarget.model.position.z - characterObj.position.z;
      const d = Math.sqrt(dx * dx + dz * dz);
      if (d < 0.01) return;
      const target = Math.atan2(dx, dz);
      // Snap directly (no smoothing — combat needs precision)
      characterObj.rotation.y = target;
    };

    function dealDamageToNearby() {
      if (!characterObj) return;
      const px = characterObj.position.x;
      const pz = characterObj.position.z;

      // Find best target — prefer existing combo target if still valid
      let bestTarget = null;
      if (_comboTarget && _comboTargetTimer > 0) {
        const dx = _comboTarget.model.position.x - px;
        const dz = _comboTarget.model.position.z - pz;
        const d = Math.sqrt(dx * dx + dz * dz);
        if (d < 3.5 && _comboTarget.model.visible && _comboTarget.aiState !== 'dead') {
          bestTarget = _comboTarget;
        }
      }

      if (!bestTarget) {
        // Find nearest zombie in front-ish (looking forward dot > -0.3)
        const facing = characterObj.rotation.y;
        const fx = Math.sin(facing);
        const fz = Math.cos(facing);
        let bestScore = -Infinity;
        for (const z of zombies) {
          if (!z.model.visible || z.aiState === 'dead') continue;
          const dx = z.model.position.x - px;
          const dz = z.model.position.z - pz;
          const d = Math.sqrt(dx * dx + dz * dz);
          if (d > 3.5) continue;
          const dot = d > 0.01 ? (dx / d) * fx + (dz / d) * fz : 1.0;
          if (dot < -0.5) continue; // behind player
          // Score: prefer closer + more forward
          const score = dot - d * 0.3;
          if (score > bestScore) { bestScore = score; bestTarget = z; }
        }
      }

      if (bestTarget) {
        _comboTarget = bestTarget;
        _comboTargetTimer = 1.5;

        // Face the target — this is the ONLY place rotation should be set during attack
        const dx = bestTarget.model.position.x - px;
        const dz = bestTarget.model.position.z - pz;
        characterObj.rotation.y = Math.atan2(dx, dz);

        // Lunge forward for 2nd combo hit (close gap after knockback)
        if (comboStep >= 2) {
          const d = Math.sqrt(dx * dx + dz * dz);
          if (d > 1.2 && d < 3.0) {
            const lungeDist = 0.5;
            const lungeDir = { x: (dx / d) * lungeDist, z: (dz / d) * lungeDist };
            let lungeFrames = 0;
            const doLunge = () => {
              if (lungeFrames >= 8 || !characterObj) return;
              lungeFrames++;
              const t = 1.0 - (lungeFrames / 8);
              characterObj.position.x += lungeDir.x * t * 0.15;
              characterObj.position.z += lungeDir.z * t * 0.15;
              requestAnimationFrame(doLunge);
            };
            requestAnimationFrame(doLunge);
          }
        }
      }

      // === Apply damage ===
      // ATTACK_REACH is tight — should not hit zombies that are clearly out of arm reach.
      const ATTACK_REACH = 2.0;
      const ATTACK_ARC_DEG = 160;
      const MAX_HIT_TARGETS = 3;
      const facing = characterObj.rotation.y;
      const fx = Math.sin(facing);
      const fz = Math.cos(facing);
      const weaponDmg = (weaponWheel && weaponWheel.equippedWeapon) ? (
        weaponWheel.equippedWeapon.id === 'axe' ? 45 :
        weaponWheel.equippedWeapon.id === 'bat' ? 28 :
        weaponWheel.equippedWeapon.id === 'knife' ? 15 : 25
      ) : 20;

      const hitSet = new Set();
      const hits = [];

      // GUARANTEED hit on locked target — but only if actually within range
      if (bestTarget && bestTarget.aiState !== 'dead' && bestTarget.model.visible) {
        const dx = bestTarget.model.position.x - characterObj.position.x;
        const dz = bestTarget.model.position.z - characterObj.position.z;
        const d = Math.sqrt(dx * dx + dz * dz);
        // Strict: target must be within real attack reach
        if (d <= ATTACK_REACH) {
          hits.push({ z: bestTarget, primary: true });
          hitSet.add(bestTarget);
        }
      }

      // Find additional targets in front arc
      for (const z of zombies) {
        if (!z.model.visible || z.aiState === 'dead') continue;
        if (hitSet.has(z)) continue;
        if (hits.length >= MAX_HIT_TARGETS) break;
        const dx = z.model.position.x - characterObj.position.x;
        const dz = z.model.position.z - characterObj.position.z;
        const d = Math.sqrt(dx * dx + dz * dz);
        if (d > ATTACK_REACH || d < 0.01) continue;
        const dot = (dx / d) * fx + (dz / d) * fz;
        const angle = Math.acos(Math.max(-1, Math.min(1, dot))) * 180 / Math.PI;
        if (angle > ATTACK_ARC_DEG / 2) continue;
        hits.push({ z, primary: false });
        hitSet.add(z);
      }

      for (let i = 0; i < hits.length; i++) {
        const { z, primary } = hits[i];
        const dmgFactor = primary ? 1.0 : 0.7;
        damageZombie(z, Math.round(weaponDmg * dmgFactor));
        if (window._spawnBloodHit) window._spawnBloodHit(z.model.position, false);
      }

      if (hits.length > 0) {
        if (window._shakeCamera) window._shakeCamera(window._hitShakeIntensity || 0.4, 0.18);
        if (window._hitStop) window._hitStop(window._hitStopDuration || 0.08);
        if (window._zoomPunch) window._zoomPunch();
      }
    }
    window._dealDamageToNearby = dealDamageToNearby;

    // ===== Shove (Q key) — area knockback for emergencies =====
    // Pushes all zombies in a wide front arc away with no damage.
    // Short cooldown so it can't be spammed.
    let shoveCooldown = 0;
    function shoveZombies() {
      if (!characterObj) return;
      if (shoveCooldown > 0) {
        console.log(`[Shove] on cooldown (${shoveCooldown.toFixed(1)}s)`);
        return;
      }
      shoveCooldown = 1.5; // seconds
      const px = characterObj.position.x;
      const pz = characterObj.position.z;
      const SHOVE_RANGE = 3.0;        // wider than attack
      const SHOVE_ARC_DEG = 200;      // very wide arc (almost 360, behind too)
      const SHOVE_FORCE = 2.5;        // strong push
      const STUN_TIME = 0.8;
      const facing = characterObj.rotation.y;
      const fx = Math.sin(facing);
      const fz = Math.cos(facing);
      let pushed = 0;
      for (const z of zombies) {
        if (!z.model.visible || z.aiState === 'dead') continue;
        const dx = z.model.position.x - px;
        const dz = z.model.position.z - pz;
        const d = Math.sqrt(dx * dx + dz * dz);
        if (d > SHOVE_RANGE) continue;
        // Arc check
        if (d > 0.01) {
          const dot = (dx / d) * fx + (dz / d) * fz;
          const angle = Math.acos(Math.max(-1, Math.min(1, dot))) * 180 / Math.PI;
          if (angle > SHOVE_ARC_DEG / 2) continue;
        }
        // Push away smoothly
        if (d > 0.01) {
          z._kbVelX = (dx / d) * SHOVE_FORCE;
          z._kbVelZ = (dz / d) * SHOVE_FORCE;
          z._kbTimer = 0.2;
        }
        // Stun via Reaction_Hit
        if (z.actions['Reaction_Hit']) {
          z.aiState = 'hit';
          z.hitTimer = STUN_TIME;
          playZombieAnim(z, 'Reaction_Hit', { loop: THREE.LoopOnce, clamp: true, force: true });
        }
        pushed++;
      }
      console.log(`[Shove] pushed ${pushed} zombies`);
      if (pushed > 0) {
        if (window._shakeCamera) window._shakeCamera(0.3, 0.15);
      }
    }
    window._shoveZombies = shoveZombies;
    window._tickShoveCooldown = (dt) => {
      if (shoveCooldown > 0) shoveCooldown -= dt;
    };

    function damageZombie(z, dmg) {
      if (z.aiState === 'dead') return;
      z.hp -= dmg;
      console.log(`[Zombie ${z.name}] hit for ${dmg}, hp=${z.hp}`);

      // Zombie faces player when hit
      if (characterObj) {
        z.model.lookAt(characterObj.position.x, z.model.position.y, characterObj.position.z);
      }

      // === KNOCKBACK: smooth push over time instead of instant teleport ===
      if (characterObj) {
        const dx = z.model.position.x - characterObj.position.x;
        const dz = z.model.position.z - characterObj.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > 0.01) {
          const weaponId = (weaponWheel && weaponWheel.equippedWeapon) ? weaponWheel.equippedWeapon.id : '';
          const kb = weaponId === 'axe' ? 0.8 :
                     weaponId === 'bat' ? 0.5 :
                     weaponId === 'mace' ? 0.7 :
                     weaponId === 'knife' ? 0.2 : 0.4;
          // Store knockback velocity on zombie for smooth interpolation
          z._kbVelX = (dx / dist) * kb;
          z._kbVelZ = (dz / dist) * kb;
          z._kbTimer = 0.15; // knockback duration in seconds
        }
      }

      if (z.hp <= 0) {
        z.aiState = 'dead';
        z.deadTimer = 0;
        if (z.isCrawler) {
          // Crawler stays down — freeze current crawl pose, don't play standing Death
          if (z.actions['Crawl']) {
            z.actions['Crawl'].paused = true;
          }
          // Stop all other anims
          for (const [name, act] of Object.entries(z.actions)) {
            if (name !== 'Crawl' && act.isRunning()) act.stop();
          }
        } else {
          playZombieAnim(z, 'Death', { loop: THREE.LoopOnce, clamp: true, force: true });
        }
        return;
      }
      if (z.actions['Reaction_Hit']) {
        z.aiState = 'hit';
        z.hitTimer = AI.HIT_STUN_TIME;
        if (z.isCrawler) {
          // Crawler: pause crawl briefly instead of standing Reaction_Hit
          if (z.actions['Crawl']) z.actions['Crawl'].paused = true;
          setTimeout(() => {
            if (z.aiState === 'hit' && z.actions['Crawl']) z.actions['Crawl'].paused = false;
          }, AI.HIT_STUN_TIME * 1000);
        } else {
          playZombieAnim(z, 'Reaction_Hit', { loop: THREE.LoopOnce, clamp: true, force: true });
        }
      } else {
        if (z.aiState === 'idle') {
          z.aiState = 'chase';
          playZombieAnim(z, 'Running');
        }
      }
    }

    // ===== Player health =====
    window._damageZombie = damageZombie;
    window._playerHp = 100;
    window._playerMaxHp = 100;

    // ===== Main AI update — called every frame from animate() =====
    function updateZombieAI(dt) {
      if (!characterObj) return;
      const px = characterObj.position.x;
      const pz = characterObj.position.z;

      for (const z of zombies) {
        if (!z.model.visible) continue;

        // === Foot pinning: keep zombie feet on the ground every frame ===
        // Animations can move the hip bone vertically; without this, some
        // zombies sink into the floor over time (esp. on map transitions).
        if (z.baseY !== undefined) {
          z.model.position.y = z.baseY;
        }

        // === Smooth knockback interpolation ===
        if (z._kbTimer && z._kbTimer > 0) {
          const t = Math.min(dt, z._kbTimer);
          const ease = z._kbTimer / 0.15;
          z.model.position.x += z._kbVelX * (t / 0.15) * ease;
          z.model.position.z += z._kbVelZ * (t / 0.15) * ease;
          z._kbTimer -= dt;
          if (z._kbTimer <= 0) {
            z._kbTimer = 0;
            z._kbVelX = 0;
            z._kbVelZ = 0;
          }
        }

        // === Attack-push: if player is attacking, gently push zombie away ===
        // (1~3단계 통합 — 공격 시 좀비를 살짝 밀어내서 회피감)
        if (window._attackPushActive && window._attackPushActive() && z.aiState !== 'dead' && z.aiState !== 'hit') {
          const dx = z.model.position.x - px;
          const dz = z.model.position.z - pz;
          const d = Math.sqrt(dx * dx + dz * dz);
          if (d < 2.5 && d > 0.01) {
            const pushAmt = 0.025; // ~25cm over the attack window
            z.model.position.x += (dx / d) * pushAmt;
            z.model.position.z += (dz / d) * pushAmt;
          }
        }

        // === IDLE-ONLY mode: zombies stand still, only react to hits ===
        if (z.aiState === 'dead') {
          z.deadTimer = (z.deadTimer || 0) + dt;
          if (z.deadTimer > 5) {
            z.hp = z.maxHp;
            z.aiState = 'idle';
            z.deadTimer = 0;
            playZombieAnim(z, 'Idle');
          }
          continue;
        }

        if (z.aiState === 'hit') {
          z.hitTimer -= dt;
          if (z.hitTimer <= 0) {
            z.aiState = 'idle';
            playZombieAnim(z, 'Idle');
          }
          continue;
        }

        // Force everything else to idle (no chase, no scream, no attack)
        if (z.aiState !== 'idle') {
          z.aiState = 'idle';
          playZombieAnim(z, 'Idle');
        }
      }

      // === Separation ===
      const SEP = AI.ZOMBIE_SEPARATION;
      const SEP_SQ = SEP * SEP;
      for (let i = 0; i < zombies.length; i++) {
        const a = zombies[i];
        if (!a.model.visible || a.aiState === 'dead') continue;
        for (let j = i + 1; j < zombies.length; j++) {
          const b = zombies[j];
          if (!b.model.visible || b.aiState === 'dead') continue;
          const dx = b.model.position.x - a.model.position.x;
          const dz = b.model.position.z - a.model.position.z;
          const distSq = dx * dx + dz * dz;
          if (distSq < SEP_SQ && distSq > 0.0001) {
            const dist = Math.sqrt(distSq);
            const overlap = (SEP - dist) * 0.5;
            const nx = dx / dist;
            const nz = dz / dist;
            if (a.aiState !== 'attack' && a.aiState !== 'hit' && a.aiState !== 'scream') {
              a.model.position.x -= nx * overlap;
              a.model.position.z -= nz * overlap;
            }
            if (b.aiState !== 'attack' && b.aiState !== 'hit' && b.aiState !== 'scream') {
              b.model.position.x += nx * overlap;
              b.model.position.z += nz * overlap;
            }
          }
        }
      }
    }
    window._updateZombieAI = updateZombieAI;

    // ===== Hit Effects: blood, sparks, camera shake, hitstop, red flash =====
    const _bloodGeo = new THREE.SphereGeometry(0.04, 4, 4);
    const _bloodMat = new THREE.MeshBasicMaterial({
      color: 0x8b1a1a, transparent: true, opacity: 0.95
    });
    const _sparkMat = new THREE.MeshBasicMaterial({
      color: 0x5c0e0e, transparent: true, opacity: 1.0
    });
    const activeBloodDrops = []; // {mesh, vel, life, maxLife, isSpark}

    function spawnBloodHit(worldPos, isPlayer) {
      const bm = window._bloodMultiplier || 1.0;
      const baseCount = isPlayer ? 10 : (20 + Math.floor(Math.random() * 12));
      const count = Math.max(1, Math.round(baseCount * bm));
      const heightOffset = isPlayer ? 1.0 : 1.3;
      const origin = new THREE.Vector3(worldPos.x, worldPos.y + heightOffset, worldPos.z);
      // Direction: blood flies TOWARD player (zombie→player direction)
      let hitDirX = 0, hitDirZ = 0;
      if (!isPlayer && characterObj) {
        hitDirX = characterObj.position.x - worldPos.x;
        hitDirZ = characterObj.position.z - worldPos.z;
        const len = Math.sqrt(hitDirX * hitDirX + hitDirZ * hitDirZ);
        if (len > 0.01) { hitDirX /= len; hitDirZ /= len; }
      }
      for (let i = 0; i < count; i++) {
        const isSpark = (Math.random() < 0.2 && !isPlayer);
        const mat = isSpark ? _sparkMat.clone() : _bloodMat.clone();
        const mesh = new THREE.Mesh(_bloodGeo, mat);
        mesh.position.copy(origin);
        const speed = 1.5 + Math.random() * 2.5;
        let vx, vy, vz;
        if (!isPlayer && (hitDirX !== 0 || hitDirZ !== 0)) {
          // Blood sprays TOWARD player
          const spread = 0.8;
          vx = (hitDirX + (Math.random() - 0.5) * spread) * speed;
          vy = (0.2 + Math.random() * 0.6) * speed;
          vz = (hitDirZ + (Math.random() - 0.5) * spread) * speed;
        } else {
          const theta = Math.random() * Math.PI * 2;
          const phi = (Math.random() * 0.4 + 0.3) * Math.PI;
          vx = Math.sin(phi) * Math.cos(theta) * speed;
          vy = Math.cos(phi) * speed;
          vz = Math.sin(phi) * Math.sin(theta) * speed;
        }
        const vel = new THREE.Vector3(vx, vy, vz);
        // Visible droplets
        const s = isSpark ? 0.5 + Math.random() * 0.4 : 0.3 + Math.random() * 0.5;
        mesh.scale.setScalar(s);
        scene.add(mesh);
        activeBloodDrops.push({
          mesh, vel, life: 0,
          maxLife: isSpark ? 0.2 : 0.6 + Math.random() * 0.4,
          isSpark, mat
        });
      }

      // Blood on player removed per user request
    }

    // Blood stains that stick to the player model temporarily
    const playerBloodStains = [];
    function spawnBloodOnPlayer() {
      if (!characterObj) return;
      // Character scale is ~0.013 in market, stains must be in local space
      // so they need to be large in local coords to be visible
      const invScale = 1.0 / characterObj.scale.x; // ~77
      const stainCount = 5 + Math.floor(Math.random() * 5); // 5-9 stains
      for (let i = 0; i < stainCount; i++) {
        const stainMat = new THREE.MeshBasicMaterial({
          color: new THREE.Color(0.5 + Math.random() * 0.2, 0.02, 0.02),
          transparent: true, opacity: 0.8, depthTest: false, side: THREE.DoubleSide
        });
        const localSize = (1.5 + Math.random() * 2.5); // in local units
        const stainMesh = new THREE.Mesh(
          new THREE.PlaneGeometry(localSize, localSize),
          stainMat
        );
        // Random position on body in local coords (character is ~130 units tall in local)
        const bodyH = 20 + Math.random() * 100; // legs to head
        const angle = Math.random() * Math.PI * 2;
        const radius = 5 + Math.random() * 10;
        stainMesh.position.set(
          Math.cos(angle) * radius,
          bodyH,
          Math.sin(angle) * radius
        );
        stainMesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
        characterObj.add(stainMesh);
        playerBloodStains.push({ mesh: stainMesh, life: 0, maxLife: 10 + Math.random() * 8, mat: stainMat });
      }
    }

    function updatePlayerBloodStains(dt) {
      for (let i = playerBloodStains.length - 1; i >= 0; i--) {
        const s = playerBloodStains[i];
        s.life += dt;
        if (s.life >= s.maxLife) {
          if (s.mesh.parent) s.mesh.parent.remove(s.mesh);
          s.mat.dispose();
          playerBloodStains.splice(i, 1);
          continue;
        }
        // Fade out in last 30%
        const fadeStart = s.maxLife * 0.7;
        if (s.life > fadeStart) {
          s.mat.opacity = 0.7 * (1 - (s.life - fadeStart) / (s.maxLife - fadeStart));
        }
      }
    }
    window._updatePlayerBloodStains = updatePlayerBloodStains;
    window._spawnBloodHit = spawnBloodHit;

    function updateBloodDrops(dt) {
      const GRAVITY = -7.5;
      for (let i = activeBloodDrops.length - 1; i >= 0; i--) {
        const d = activeBloodDrops[i];
        d.life += dt;
        if (d.life >= d.maxLife) {
          scene.remove(d.mesh);
          d.mesh.geometry = null;
          d.mat.dispose();
          activeBloodDrops.splice(i, 1);
          continue;
        }
        // Physics
        d.vel.y += GRAVITY * dt;
        d.mesh.position.x += d.vel.x * dt;
        d.mesh.position.y += d.vel.y * dt;
        d.mesh.position.z += d.vel.z * dt;
        // Fade out near end of life
        const t = d.life / d.maxLife;
        d.mat.opacity = (1 - t) * (d.isSpark ? 1.0 : 0.95);
        // Sparks shrink, blood doesn't
        if (d.isSpark) d.mesh.scale.setScalar(Math.max(0.05, 1 - t));
      }

      if (intensity > camShake.intensity) {
        camShake.intensity = intensity;
        camShake.duration = duration;
        camShake.elapsed = 0;
      }
    }
    window._shakeCamera = shakeCamera;
    function updateCameraShake(dt) {
      if (camShake.elapsed >= camShake.duration) return new THREE.Vector3();
      camShake.elapsed += dt;
      const t = camShake.elapsed / camShake.duration;
      const decay = 1 - t;
      const mag = camShake.intensity * decay;
      return new THREE.Vector3(
        (Math.random() - 0.5) * 2 * mag,
        (Math.random() - 0.5) * 2 * mag,
        (Math.random() - 0.5) * 2 * mag
      );
    }

      // Remove any pending finished listener
      if (_reactionFinishListener) {

      // Clear safety timer
      if (_reactionSafetyTimer) {

      // Force stop both reaction actions to clean state

      _activeReactionAction = null;

      // Determine correct restore state
      if (moveState === 'attack' || moveState === 'combo') moveState = 'idle';
      const restore = getActionForState(moveState);
      if (restore) {
        // Ensure restore action has full weight and is playing cleanly

        restore.fadeIn(0.15);

    }

      if (isPlayerDead) return;
      if (!reaction1Action && !reaction2Action) return;
      // === 3단계: Super-armor — during attack push window, ignore hit reactions ===
      if (window._isSuperArmor && window._isSuperArmor()) return;

      // If already reacting, clean up previous reaction first
      if (isReacting && _activeReactionAction) {
        if (_reactionFinishListener) {
          characterMixer.removeEventListener('finished', _reactionFinishListener);
          _reactionFinishListener = null;
        }
        if (_reactionSafetyTimer) {
          clearTimeout(_reactionSafetyTimer);
          _reactionSafetyTimer = null;
        }
        _activeReactionAction.stop();
        _activeReactionAction.setEffectiveWeight(0);
      }

      const chosen = (nextReactionToggle % 2 === 0)
        ? (reaction1Action || reaction2Action)
        : (reaction2Action || reaction1Action);
      nextReactionToggle++;
      _activeReactionAction = chosen;

      // Stop all movement/attack actions cleanly (don't just crossFade — explicit stop)
      const allMove = [idleAction, walkAction, runAction, weaponIdleAction, weaponWalkAction,
                       sneakAction, danceAction, downSwingAction, downSwing1Action, downSwing2Action,
                       axeSwing1Action, axeSwing2Action, downSwing3Action];
      for (const a of allMove) {
        if (a && a !== chosen) {
          a.fadeOut(0.08);
        }
      }
      // Also stop the other reaction if it was somehow still running
      const other = (chosen === reaction1Action) ? reaction2Action : reaction1Action;
      if (other) { other.stop(); other.setEffectiveWeight(0); }

      isReacting = true;
      isAttacking = false; // cancel any in-progress attack
      comboChain = [];
      comboStep = 0;

      chosen.stop(); // ensure clean state
      chosen.setEffectiveWeight(1);
      chosen.setEffectiveTimeScale(1);
      chosen.reset();
      chosen.play();

      // Get clip duration for safety timer
      const clipDuration = chosen.getClip().duration;
      const safetyMs = (clipDuration + 0.5) * 1000; // clip + generous buffer

      // finished event listener
      const onFinish = (e) => {
        if (e.action === chosen) {
          _endReaction();
        }
      };
      _reactionFinishListener = onFinish;
      characterMixer.addEventListener('finished', onFinish);

      // Safety timer: if finished event never fires, force recovery
      _reactionSafetyTimer = setTimeout(() => {
        if (isReacting && _activeReactionAction === chosen) {
          console.warn('[Reaction] Safety timer triggered — forcing recovery');
          _endReaction();
        }
      }, safetyMs);
    }
    window._playPlayerReaction = playPlayerReaction;

      if (isPlayerDead) return;

      const death = pick || death1Action || death2Action;
      if (!death) {

      // Stop all other actions

                   downSwing3Action, sneakAction, reaction1Action, reaction2Action];
      for (const a of all) {

  // ===== Resize =====
  function handleResize() {

    composer.setSize(width, height);

  // ===== Map Switching System =====
  const mapToggleBtn = document.getElementById('map-toggle-btn');

  async function switchMap(targetMap) {
    if (isMapLoading) return;
    if (targetMap === currentMap) return;
    isMapLoading = true;
    mapToggleBtn.disabled = true;
    mapToggleBtn.textContent = '⏳ 로딩...';

    try {
      // 1. Remove current stage from scene
      if (currentStageObj) {
        scene.remove(currentStageObj);
        currentStageObj.traverse(obj => {
          if (obj.isMesh) {
            if (obj.geometry) obj.geometry.dispose();
            if (obj.material) {
              const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
              mats.forEach(m => {
                if (m.map) m.map.dispose();
                m.dispose();
              });
            }
          }
        });
        currentStageObj = null;
      }

      // 2. Hide/show zombies based on target map
      // Zombies now live in the market (not the house)
      for (const z of zombies) {
        z.model.visible = (targetMap === 'market');

      stageMeshes = [];
      meshIdMap.clear();
      collisionMeshes = [];
      floorMeshIds.clear();

      occlusionMeshArray = [];

      for (const door of doorEntries) {
        if (door.pivot) scene.remove(door.pivot);
      }
      doorEntries = [];
      occludedMeshes.clear();

      // 4. Load new map
      const url = targetMap === 'market' ? MARKET_URL : STAGE_URL;
      console.log(`[Map] Loading: ${url}`);
      const gltf = await loader.loadAsync(url);
      const newStage = gltf.scene;
      console.log(`[Map] GLB loaded successfully, children: ${newStage.children.length}`);

      // Compute bounding box BEFORE adding to scene to diagnose scale/position
      const rawBox = new THREE.Box3().setFromObject(newStage);
      const rawSize = rawBox.getSize(new THREE.Vector3());
      const rawCenter = rawBox.getCenter(new THREE.Vector3());
      console.log(`[Map] Raw bounding box — center: [${rawCenter.toArray().map(v=>v.toFixed(2))}], size: [${rawSize.toArray().map(v=>v.toFixed(2))}], min.y: ${rawBox.min.y.toFixed(2)}`);

      // Auto-scale: if the map is extremely small (< 2 units) or extremely large (> 500 units), normalize
      const maxDim = Math.max(rawSize.x, rawSize.y, rawSize.z);
      let mapScale = 1;
      if (maxDim > 0 && maxDim < 2) {
        // Too small — scale up to ~30 units (similar to haunted house)
        mapScale = 30 / maxDim;
        console.log(`[Map] Auto-scaling UP: ${mapScale.toFixed(2)}x (maxDim was ${maxDim.toFixed(3)})`);
        newStage.scale.setScalar(mapScale);
      } else if (maxDim > 500) {
        // Too large — scale down to ~30 units
        mapScale = 30 / maxDim;
        console.log(`[Map] Auto-scaling DOWN: ${mapScale.toFixed(4)}x (maxDim was ${maxDim.toFixed(1)})`);
        newStage.scale.setScalar(mapScale);
      }

      scene.add(newStage);
      currentStageObj = newStage;

      // Update world matrices after scale and scene addition
      newStage.updateMatrixWorld(true);

      newStage.traverse(obj => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
          obj.userData._worldX = obj.matrixWorld.elements[12];
          obj.userData._worldZ = obj.matrixWorld.elements[14];
          // Fix red placeholder materials (missing textures or default red color)
          const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
          mats.forEach(m => {
            if (m.color) {
              const r = m.color.r, g = m.color.g, b = m.color.b;
              // Detect red-ish colors (r > 0.8, g < 0.3, b < 0.3)
              if (r > 0.8 && g < 0.3 && b < 0.3) {
                m.color.set(0xcccccc);
                console.log(`[Map] Fixed red material on "${obj.name}"`);
              }
            }
            if (m.emissive) {
              const r = m.emissive.r, g = m.emissive.g, b = m.emissive.b;
              if (r > 0.8 && g < 0.3 && b < 0.3) {
                m.emissive.set(0x000000);
                console.log(`[Map] Fixed red emissive on "${obj.name}"`);
              }
            }
            // Fix alpha-blended grass/foliage textures that show as V-shaped
            // slashes from incorrect transparency sorting. Switch from blend
            // to alphaTest (cutout), which is order-independent and renders
            // correctly for grass/leaves.
            if (m.transparent && m.map) {
              m.transparent = false;
              m.alphaTest = 0.5;
              m.depthWrite = true;
              m.side = THREE.DoubleSide;
              m.needsUpdate = true;
            }
          });
        }
      });

      // 5. Number meshes
      let meshId = 1;
      newStage.traverse(obj => {
        if (obj.isMesh) {
          obj.userData._meshId = meshId;
          meshIdMap.set(obj, meshId);
          stageMeshes.push({ mesh: obj, id: meshId });
          meshId++;

      console.log(`[Map] Numbered ${stageMeshes.length} meshes`);

      // 6. Detect floors & rebuild collision
      if (targetMap === 'house') {

          if (HIDDEN_MESH_IDS.includes(id)) {
            mesh.visible = false;

        }
        detectFloorMeshes(false);
        setupDoors(scene);
      } else {
        detectFloorMeshes(true);
      }
      rebuildCollisionMeshes();
      updateMapBounds(newStage);

      // 6.5. Update camera target distance & speed BEFORE placing character,
      //      so cam.dist can be snapped to the right value below.
      if (targetMap === 'market') {
        CHAR_MOVE_SPEED = CHAR_MOVE_SPEED_MARKET;
        CHAR_RUN_SPEED = CHAR_RUN_SPEED_MARKET;
        cam.targetDist = 13;
        cam.zoom = 2.0;
        if (walkAction) walkAction.timeScale = CHAR_MOVE_SPEED / 1.3;
        if (runAction) runAction.timeScale = CHAR_RUN_SPEED / 3.0;

        if (weaponWalkAction) weaponWalkAction.timeScale = (CHAR_MOVE_SPEED * 1.15) / 1.3;
        // Sneak now 0.65x walk
        if (sneakAction) sneakAction.timeScale = (CHAR_MOVE_SPEED * 0.65) / 0.9;
      } else {
        CHAR_MOVE_SPEED = CHAR_MOVE_SPEED_HOUSE;
        CHAR_RUN_SPEED = CHAR_RUN_SPEED_HOUSE;
        cam.targetDist = cam.defaultDist;
        cam.zoom = 1.0;
        if (walkAction) walkAction.timeScale = CHAR_MOVE_SPEED / 1.3;
        if (runAction) runAction.timeScale = CHAR_RUN_SPEED / 3.0;

          spawnY = savedSpawn.y;

          spawnZ = -3.746;

        console.log(`[Map] Final map box — center: [${center.toArray().map(v=>v.toFixed(2))}], size: [${size.toArray().map(v=>v.toFixed(2))}]`);

        // Reset safe position & camera lookAt for immediate snap
        lastSafePos = characterObj.position.clone();
        stuckFrames = 0;
        cam.lookAt.copy(characterObj.position).add(new THREE.Vector3(0, cam.heightOffset, 0));
        // Snap camera distance AND zoom instantly — no zoom-in animation
        cam.dist = cam.targetDist / cam.zoom;

        // Reposition zombies around the player on market entry
        if (targetMap === 'market' && zombies.length > 0) {
          const px = characterObj.position.x;
          const py = characterObj.position.y;
          const pz = characterObj.position.z;
          const ZOMBIE_HOUSE_RATIO = 0.70 / 0.0384;
          const playerScale = characterObj.scale.x;
          const targetZombieScale = playerScale * ZOMBIE_HOUSE_RATIO;
          const RING_RADIUS_MIN = 4;
          const RING_RADIUS_MAX = 10;
          for (let i = 0; i < zombies.length; i++) {
            const z = zombies[i];
            const angle = (i / zombies.length) * Math.PI * 2 + Math.random() * 0.4;
            const radius = RING_RADIUS_MIN + Math.random() * (RING_RADIUS_MAX - RING_RADIUS_MIN);
            const zx = px + Math.cos(angle) * radius;
            const zz = pz + Math.sin(angle) * radius;

            z.model.scale.setScalar(targetZombieScale);
            z.model.position.set(zx, py, zz);
            // Force Idle pose BEFORE measuring foot position — otherwise
            // crawl/running poses give incorrect bbox and zombie sinks.
            if (z.actions && z.actions['Idle']) {
              const idleAct = z.actions['Idle'];
              idleAct.reset(); idleAct.setEffectiveWeight(1); idleAct.play();
              z.currentAction = idleAct;
              if (z.mixer) z.mixer.update(0); // apply pose immediately
            }
            z.model.updateMatrixWorld(true);
            const box = new THREE.Box3().setFromObject(z.model);
            const footOffset = z.model.position.y - box.min.y;
            z.model.position.y = py + footOffset;

            if (z.baseX !== undefined) z.baseX = zx;
            if (z.baseZ !== undefined) z.baseZ = zz;
            if (z.baseY !== undefined) z.baseY = z.model.position.y;
            z.model.lookAt(px, z.model.position.y, pz);
            // Reset AI state on map entry
            // Make some zombies crawlers (indices 2, 5 = Female E, Male C)
            const crawlerIndices = [2, 5];
            z.isCrawler = crawlerIndices.includes(i);
            z.aiState = 'idle';
            z.hp = z.maxHp;
            z.attackCooldown = 0;
            z.hitTimer = 0;
            z.screamTimer = 0;
            z.deadTimer = 0;
            if (z.isCrawler && z.actions['Crawl']) {
              if (window._playZombieAnim) window._playZombieAnim(z, 'Crawl');
            } else {
              if (window._playZombieAnim) window._playZombieAnim(z, 'Idle');
            }
          }
          console.log(`[Zombies] Repositioned ${zombies.length} zombies, scale=${targetZombieScale.toFixed(4)}`);
          // Reset player HP and dead state on entering market
          window._playerHp = window._playerMaxHp || 100;
          isPlayerDead = false;
          isReacting = false;
          const goEl = document.getElementById('game-over');
          if (goEl) goEl.style.display = 'none';
          if (window._updateHpHud) window._updateHpHud();
        } else if (targetMap === 'house' && zombies.length > 0) {
          for (const z of zombies) {
            z.model.scale.setScalar(0.70);
          }
        }
      }

      // 8. Update state & UI (visuals only — speeds/distance set above)
      currentMap = targetMap;
      window._marketCullDisabled = false; // re-run "force all visible" pass on entry
      // Show body attachments (backpack, flashlight) only in the market
      if (bodyAttachments) bodyAttachments.setAllVisible(targetMap === 'market');

      if (targetMap === 'market') {
        mapToggleBtn.textContent = '🏚️ 하우스';
        if (roomNameEl) roomNameEl.textContent = '🏪 마켓';
        // Apply market mood automatically (matches the reference screenshot:
        // dim grey-blue ambient, no fog, no extra point lights).
        applyMood('marketDefault');
        // Sync mood-panel active state
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
        scene.fog = null;
      } else {
        mapToggleBtn.textContent = '🏪 마켓';
        if (roomNameEl) roomNameEl.textContent = '🏠';
        // House: use the same default — moods are now all horror-themed and apply globally
        applyMood('marketDefault');
        document.querySelectorAll('.mood-btn').forEach(b => {
          b.classList.toggle('active', b.dataset.mood === 'marketDefault');
        });
        scene.fog = null;
      }

      console.log(`[Map] Switched to: ${targetMap}`);
    } catch (err) {
      console.error(`[Map] Failed to load ${targetMap}:`, err);
      // Revert button text
      mapToggleBtn.textContent = currentMap === 'house' ? '🏪 마켓' : '🏚️ 하우스';
    } finally {
      isMapLoading = false;
      mapToggleBtn.disabled = false;
    }
  }

  mapToggleBtn.addEventListener('click', () => {
    const target = currentMap === 'house' ? 'market' : 'house';
    switchMap(target);
  });

  // ===== Interaction handler (E key) =====
  function handleInteraction() {
    if (!nearestInteractable) return;
    const { type, data } = nearestInteractable;
    if (type === 'door') {
      const door = data;
      if (door.animating) return;
      door.animating = true;
      door.animDir = door.isOpen ? -1 : 1;
    }
  }

  // ===== applyMood =====
  function applyMood(key) {
    const m = MOODS[key];
    if (!m) return;
    lightTarget.bgColor.set(0x000000);
    lightTarget.ambientColor.set(m.ambient[0]);
    lightTarget.ambientIntensity = m.ambient[1];
    lightTarget.sunColor.set(m.sun[0]);
    lightTarget.sunIntensity = m.sun[1];
    lightTarget.sunPos.set(m.sun[2], m.sun[3], m.sun[4]);
    lightTarget.hemiSky.set(m.hemisphere[0]);
    lightTarget.hemiGround.set(m.hemisphere[1]);
    lightTarget.hemiIntensity = m.hemisphere[2];
    lightTarget.roomColor.set(m.rooms[0]);
    lightTarget.roomIntensity = m.rooms[1];
    lightTarget.roomDistance = m.rooms[2];
    lightTarget.accentColor.set(m.accents[0]);
    lightTarget.accentIntensity = m.accents[1];
    lightTarget.accentDistance = m.accents[2];
    lightTarget.exposure = m.exposure;
    // ===== Apply fog (horror moods only) =====
    // Wrapped in try so any unexpected issue here can't kill the game.
    try {
      if (m.fog) {
        scene.fog = new THREE.Fog(m.fog[0], m.fog[1], m.fog[2]);
      } else if (currentMap !== 'market') {
        scene.fog = null;
      }
    } catch (e) {
      console.warn('[Mood] fog apply failed:', e);
    }
    console.log(`[Mood] Applied: ${key}`);
  }

  // ===== Minimap =====
  // Top-down view of the current map, drawn on a 2D canvas in the corner.
  // Shows map bounds, player position + facing direction, and zombies in market mode.
  const minimapCanvas = document.getElementById('minimap');
  const minimapCtx = minimapCanvas ? minimapCanvas.getContext('2d') : null;
  const MINIMAP_SIZE = 180;
  const MINIMAP_PAD = 8; // px padding inside the canvas

  function drawMinimap() {
    if (!minimapCtx || !characterObj) return;

    const ctx = minimapCtx;
    ctx.clearRect(0, 0, MINIMAP_SIZE, MINIMAP_SIZE);

    // Bounds may not be initialized yet (Infinity); guard.
    if (!isFinite(mapBoundsMinX) || !isFinite(mapBoundsMaxX)) return;

    // World-space bounds (unpadded by the in-game margin) for display.
    const worldMinX = mapBoundsMinX - MAP_BOUNDARY_MARGIN;
    const worldMaxX = mapBoundsMaxX + MAP_BOUNDARY_MARGIN;
    const worldMinZ = mapBoundsMinZ - MAP_BOUNDARY_MARGIN;
    const worldMaxZ = mapBoundsMaxZ + MAP_BOUNDARY_MARGIN;
    const worldW = worldMaxX - worldMinX;
    const worldH = worldMaxZ - worldMinZ;
    if (worldW <= 0 || worldH <= 0) return;

    // Fit the world rect into the canvas, preserving aspect ratio.
    const avail = MINIMAP_SIZE - MINIMAP_PAD * 2;
    const scale = Math.min(avail / worldW, avail / worldH);
    const drawW = worldW * scale;
    const drawH = worldH * scale;
    const offX = (MINIMAP_SIZE - drawW) / 2;
    const offY = (MINIMAP_SIZE - drawH) / 2;

    // Map world (x, z) -> canvas (px, py). North (-z) = top.
    function toMap(wx, wz) {
      const px = offX + (wx - worldMinX) * scale;
      const py = offY + (wz - worldMinZ) * scale;
      return [px, py];
    }

    // Map boundary rectangle
    ctx.strokeStyle = 'rgba(200,150,100,0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(offX, offY, drawW, drawH);

    // Inner safe area (where the player can actually move)
    const [sx0, sy0] = toMap(mapBoundsMinX, mapBoundsMinZ);
    const [sx1, sy1] = toMap(mapBoundsMaxX, mapBoundsMaxZ);
    ctx.strokeStyle = 'rgba(200,150,100,0.15)';
    ctx.setLineDash([2, 3]);
    ctx.strokeRect(sx0, sy0, sx1 - sx0, sy1 - sy0);
    ctx.setLineDash([]);

    // Zombies (market mode only)
    if (currentMap === 'market' && zombies.length) {
      ctx.fillStyle = '#cc4422';
      for (const z of zombies) {
        if (!z.model.visible) continue;
        const [zx, zy] = toMap(z.model.position.x, z.model.position.z);
        ctx.beginPath();
        ctx.arc(zx, zy, 2.2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Player position
    const [ppx, ppy] = toMap(characterObj.position.x, characterObj.position.z);
    const outOfBounds = (
      characterObj.position.x < mapBoundsMinX ||
      characterObj.position.x > mapBoundsMaxX ||
      characterObj.position.z < mapBoundsMinZ ||
      characterObj.position.z > mapBoundsMaxZ
    );

    // Glow ring (warn if out of bounds)
    ctx.fillStyle = outOfBounds ? 'rgba(255,80,40,0.25)' : 'rgba(255,200,120,0.25)';
    ctx.beginPath();
    ctx.arc(ppx, ppy, 7, 0, Math.PI * 2);
    ctx.fill();

    // Player dot
    ctx.fillStyle = outOfBounds ? '#ff6644' : '#ffcc66';
    ctx.beginPath();
    ctx.arc(ppx, ppy, 3.2, 0, Math.PI * 2);
    ctx.fill();

    // Facing arrow — use the character's world Y rotation.
    // In Three.js the character faces -Z when rotation.y = 0, so the world-space
    // forward direction is (sin(rot.y), 0, cos(rot.y)) — but on the minimap +y axis
    // points to +z, so we plot (sin, cos) directly.
    const facing = characterObj.rotation.y;
    const fx = Math.sin(facing);
    const fz = Math.cos(facing);
    const arrowLen = 9;
    ctx.strokeStyle = outOfBounds ? '#ff6644' : '#ffcc66';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(ppx, ppy);
    ctx.lineTo(ppx + fx * arrowLen, ppy + fz * arrowLen);
    ctx.stroke();

    // Out-of-bounds warning text
    if (outOfBounds) {
      ctx.fillStyle = '#ff6644';
      ctx.font = 'bold 9px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('OUT OF BOUNDS', MINIMAP_SIZE / 2, MINIMAP_SIZE - 4);
    }
  }

  // ===== Body Attachments system =====
  // Loads GLB models and attaches them to character bones. Once attached as a
  // bone's child, the model follows skeletal animation automatically (because
  // SkinnedMesh world matrices propagate from the bone transform).
  //
  // Usage:
  //   const att = createBodyAttachments(characterObj, [{ id, name, bone, position, rotation, scale, url? }, ...]);
  //   att.load(id, url);    // load and attach a GLB
  //   att.remove(id);       // detach
  //   att.openPanel();      // show adjust UI (also bound to 'B' key)
  function createBodyAttachments(player, configs) {
    const loader = new GLTFLoader();
    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
    dracoLoader.setDecoderConfig({ type: 'js' });
    dracoLoader.setWorkerLimit(0);
    loader.setDRACOLoader(dracoLoader);

    // Cache all bones by name for fast lookup
    const bones = new Map();
    player.traverse(o => { if (o.isBone) bones.set(o.name, o); });
    console.log(`[Attachments] Found ${bones.size} bones`);

    // State: id -> { config, model, bone }
    const slots = new Map();
    for (const c of configs) slots.set(c.id, { config: c, model: null, bone: null });

    function findBone(name) {
      if (bones.has(name)) return bones.get(name);
      // Case-insensitive fallback
      const low = name.toLowerCase();
      for (const [bn, b] of bones) {
        if (bn.toLowerCase() === low) return b;
      }
      // Loose substring match (last resort)
      for (const [bn, b] of bones) {
        if (bn.toLowerCase().includes(low.replace('mixamorig:', ''))) return b;
      }
      return null;
    }

    function applyTransform(slot) {
      if (!slot.model) return;
      const c = slot.config;
      slot.model.position.set(c.position.x, c.position.y, c.position.z);
      const DEG2RAD = Math.PI / 180;
      slot.model.rotation.set(c.rotation.x * DEG2RAD, c.rotation.y * DEG2RAD, c.rotation.z * DEG2RAD);
      slot.model.scale.setScalar(c.scale);
    }

    async function load(id, url) {
      const slot = slots.get(id);
      if (!slot) { console.warn('[Attachments] Unknown id:', id); return; }

      // Remove previous model if any
      if (slot.model && slot.model.parent) slot.model.parent.remove(slot.model);

      const bone = findBone(slot.config.bone);
      if (!bone) {
        console.warn(`[Attachments] Bone "${slot.config.bone}" not found for ${id}`);
        return;
      }

      try {
        const gltf = await loader.loadAsync(url);
        const model = gltf.scene;
        // Enable shadows
        model.traverse(o => {
          if (o.isMesh) { o.castShadow = true; o.receiveShadow = false; }
        });
        bone.add(model);
        slot.model = model;
        slot.bone = bone;
        applyTransform(slot);
        console.log(`[Attachments] ${id} attached to ${bone.name}`);
      } catch (err) {
        console.error(`[Attachments] Failed to load ${id}:`, err);
      }
    }

    function remove(id) {
      const slot = slots.get(id);
      if (slot && slot.model && slot.model.parent) {
        slot.model.parent.remove(slot.model);
        slot.model = null;
      }
    }

    // ===== Adjustment Panel UI =====
    let panel = null;
    let activeId = null;

    function buildPanel() {
      panel = document.createElement('div');
      panel.id = 'attachments-panel';
      panel.innerHTML = `
        <div class="ap-title">🎒 Body Attachments</div>
        <div class="ap-tabs"></div>
        <div class="ap-empty" style="display:none">No GLB loaded for this slot.<br>Set <code>url</code> in the ATTACHMENTS config.</div>
        <div class="ap-rows"></div>
        <div class="ap-hint">Press <kbd>B</kbd> to toggle</div>
      `;
      document.body.appendChild(panel);
      makeDraggable(panel, panel.querySelector('.ap-title'));

      const tabs = panel.querySelector('.ap-tabs');
      for (const c of configs) {
        const t = document.createElement('button');
        t.className = 'ap-tab';
        t.textContent = c.name;
        t.dataset.id = c.id;
        t.onclick = () => selectTab(c.id);
        tabs.appendChild(t);
      }

      selectTab(configs[0]?.id);
    }

    function selectTab(id) {
      activeId = id;
      panel.querySelectorAll('.ap-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.id === id);
      });
      renderRows();
    }

    function renderRows() {
      const rows = panel.querySelector('.ap-rows');
      const empty = panel.querySelector('.ap-empty');
      rows.innerHTML = '';
      const slot = slots.get(activeId);
      if (!slot) return;

      if (!slot.model) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      const c = slot.config;
      const defs = [
        { label: 'posX', path: ['position', 'x'], min: -100, max: 100, step: 0.5 },
        { label: 'posY', path: ['position', 'y'], min: -100, max: 100, step: 0.5 },
        { label: 'posZ', path: ['position', 'z'], min: -100, max: 100, step: 0.5 },
        { label: 'rotX', path: ['rotation', 'x'], min: -180, max: 180, step: 1 },
        { label: 'rotY', path: ['rotation', 'y'], min: -180, max: 180, step: 1 },
        { label: 'rotZ', path: ['rotation', 'z'], min: -180, max: 180, step: 1 },
      ];
      for (const d of defs) {
        const row = document.createElement('div');
        row.className = 'ap-row';
        const cur = c[d.path[0]][d.path[1]];
        row.innerHTML = `
          <span class="ap-lbl">${d.label}</span>
          <input type="range" class="ap-slider" min="${d.min}" max="${d.max}" step="${d.step}" value="${cur}">
          <span class="ap-val">${cur.toFixed(d.step < 1 ? 1 : 0)}</span>
        `;
        const slider = row.querySelector('.ap-slider');
        const val = row.querySelector('.ap-val');
        slider.oninput = () => {
          const v = parseFloat(slider.value);
          c[d.path[0]][d.path[1]] = v;
          val.textContent = v.toFixed(d.step < 1 ? 1 : 0);
          applyTransform(slot);
        };
        rows.appendChild(row);
      }
      // Scale row (uniform) — wide range because GLB sizes vary wildly
      const sRow = document.createElement('div');
      sRow.className = 'ap-row';
      sRow.innerHTML = `
        <span class="ap-lbl">scale</span>
        <input type="range" class="ap-slider" min="0.01" max="100" step="0.01" value="${c.scale}">
        <span class="ap-val">${c.scale.toFixed(2)}</span>
      `;
      const sSlider = sRow.querySelector('.ap-slider');
      const sVal = sRow.querySelector('.ap-val');
      sSlider.oninput = () => {
        const v = parseFloat(sSlider.value);
        c.scale = v;
        sVal.textContent = v.toFixed(2);
        applyTransform(slot);
      };
      rows.appendChild(sRow);

      // Bone selector — let user retarget without editing code
      const boneRow = document.createElement('div');
      boneRow.className = 'ap-bone-row';
      const boneOptions = [
        'mixamorig:Spine', 'mixamorig:Spine1', 'mixamorig:Spine2',
        'mixamorig:Head', 'mixamorig:Neck',
        'mixamorig:LeftShoulder', 'mixamorig:RightShoulder',
        'mixamorig:LeftArm', 'mixamorig:RightArm',
        'mixamorig:LeftHand', 'mixamorig:RightHand',
        'mixamorig:Hips',
      ];
      boneRow.innerHTML = `
        <span class="ap-lbl">bone</span>
        <select class="ap-bone-select">
          ${boneOptions.map(b => `<option value="${b}" ${b === c.bone ? 'selected' : ''}>${b.replace('mixamorig:', '')}</option>`).join('')}
        </select>
      `;
      const boneSelect = boneRow.querySelector('.ap-bone-select');
      boneSelect.onchange = () => {
        c.bone = boneSelect.value;
        // Re-parent the existing model to the new bone
        if (slot.model && slot.model.parent) {
          slot.model.parent.remove(slot.model);
          const newBone = findBone(c.bone);
          if (newBone) {
            newBone.add(slot.model);
            slot.bone = newBone;
            applyTransform(slot);
          }
        }
      };
      rows.appendChild(boneRow);

      // Config dump button (for saving to code)
      const dumpRow = document.createElement('div');
      dumpRow.className = 'ap-dump';
      dumpRow.textContent =
        `bone: '${c.bone}', ` +
        `position: { x: ${c.position.x}, y: ${c.position.y}, z: ${c.position.z} }, ` +
        `rotation: { x: ${c.rotation.x}, y: ${c.rotation.y}, z: ${c.rotation.z} }, ` +
        `scale: ${c.scale}`;
      dumpRow.title = 'Click to copy';
      dumpRow.onclick = () => {
        navigator.clipboard.writeText(dumpRow.textContent).catch(()=>{});
        const orig = dumpRow.style.background;
        dumpRow.style.background = 'rgba(200,150,100,0.4)';
        setTimeout(() => dumpRow.style.background = orig, 500);
      };
      rows.appendChild(dumpRow);
    }

    function openPanel() {
      if (!panel) buildPanel();
      panel.style.display = 'block';
      renderRows();
    }
    function closePanel() { if (panel) panel.style.display = 'none'; }
    function togglePanel() {
      if (!panel || panel.style.display === 'none') openPanel();
      else closePanel();
    }

    // Bind 'B' key
    window.addEventListener('keydown', e => {
      if (e.code === 'KeyB' && !e.repeat) {
        // Skip if user is typing in an input
        if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
        togglePanel();
      }
    });

    function setVisible(id, visible) {
      const slot = slots.get(id);
      if (slot && slot.model) slot.model.visible = visible;
    }
    function setAllVisible(visible) {
      for (const slot of slots.values()) {
        if (slot.model) slot.model.visible = visible;
      }
    }

    return { load, remove, setVisible, setAllVisible, openPanel, closePanel, togglePanel, slots };
  }

  // ===== Spawn Position panel =====
  // Lets the user (a) see the live player position, (b) save the current
  // position as the "market spawn", (c) teleport there, and (d) copy the
  // coordinates to clipboard for sharing. Stored in localStorage so it
  // persists across page reloads.
  const SPAWN_KEY = 'eden.marketSpawn';
  // Default market spawn (provided by the user). localStorage overrides this.
  const DEFAULT_MARKET_SPAWN = { x: 19.68, y: 0, z: -3.746, useOnEntry: true };
  let savedSpawn = { ...DEFAULT_MARKET_SPAWN };
  let useSavedSpawn = true;
  try {
    const raw = localStorage.getItem(SPAWN_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed.x === 'number') {
        savedSpawn = parsed;
        useSavedSpawn = !!parsed.useOnEntry;
        console.log('[Spawn] Loaded saved market spawn:', savedSpawn);
      }
    }
  } catch (e) { /* ignore */ }

  // Expose for the map-switch logic
  function getMarketSpawnPos(fallbackCenter) {
    if (useSavedSpawn && savedSpawn) {
      return new THREE.Vector3(savedSpawn.x, savedSpawn.y, savedSpawn.z);
    }
    return fallbackCenter;
  }

  const spawnPanel = document.createElement('div');
  spawnPanel.id = 'spawn-panel';
  spawnPanel.innerHTML = `
    <div class="sp-title">📍 SPAWN POSITION</div>
    <div class="sp-live">
      <div class="sp-row"><span>X</span><span class="sp-x">0.00</span></div>
      <div class="sp-row"><span>Y</span><span class="sp-y">0.00</span></div>
      <div class="sp-row"><span>Z</span><span class="sp-z">0.00</span></div>
    </div>
    <button class="sp-btn sp-save">📌 현재 위치 저장</button>
    <button class="sp-btn sp-tp">🚀 저장된 위치로 이동</button>
    <label class="sp-toggle">
      <input type="checkbox" class="sp-use">
      <span>마켓 진입 시 저장된 위치로 스폰</span>
    </label>
    <div class="sp-saved-label">저장됨:</div>
    <div class="sp-saved-val" title="클릭해서 복사">없음</div>
    <button class="sp-btn sp-clear">🗑️ 저장 초기화</button>
    <div class="sp-hint"><kbd>P</kbd> 토글</div>
  `;
  spawnPanel.style.display = 'none';
  document.body.appendChild(spawnPanel);
  makeDraggable(spawnPanel, spawnPanel.querySelector('.sp-title'));

  const spX = spawnPanel.querySelector('.sp-x');
  const spY = spawnPanel.querySelector('.sp-y');
  const spZ = spawnPanel.querySelector('.sp-z');
  const spSaved = spawnPanel.querySelector('.sp-saved-val');
  const spUse = spawnPanel.querySelector('.sp-use');

  function refreshSavedDisplay() {
    if (savedSpawn) {
      spSaved.textContent = `x: ${savedSpawn.x.toFixed(2)}, y: ${savedSpawn.y.toFixed(2)}, z: ${savedSpawn.z.toFixed(2)}`;
    } else {
      spSaved.textContent = '없음';
    }
    spUse.checked = useSavedSpawn;
  }
  refreshSavedDisplay();

  spawnPanel.querySelector('.sp-save').onclick = () => {
    if (!characterObj) return;
    savedSpawn = {

  function applyVision() {
    // Vignette / flashlight
    let radial = '';
    if (vision.flashlight.on) {

      radial = `radial-gradient(circle at center, rgba(0,0,0,0) ${(r*60).toFixed(0)}%, rgba(0,0,0,${d}) 100%)`;

      const d = vision.vignette.darkness;

      if (vision.brightness.on) filters.push(`brightness(${vision.brightness.value.toFixed(2)})`);
      if (vision.blur.on)       filters.push(`blur(${vision.blur.value.toFixed(2)}px)`);

      if (vision.invert.on)     filters.push(`invert(${vision.invert.value.toFixed(2)})`);

  function buildRow(def) {
    const row = document.createElement('div');
    row.className = 'vp-row';
    row.dataset.key = def.key;

    const head = document.createElement('div');
    head.className = 'vp-head';
    head.innerHTML = `
      <label class="vp-toggle"><input type="checkbox" class="vp-on" ${vision[def.key].on ? 'checked' : ''}><span>${def.label}</span></label>
    `;
    row.appendChild(head);

    head.querySelector('.vp-on').onchange = (e) => {
      vision[def.key].on = e.target.checked;
      applyVision();
    };

    for (const s of def.sliders) {
      const sliderRow = document.createElement('div');
      sliderRow.className = 'vp-slider-row';
      const cur = vision[s.obj][s.prop];
      sliderRow.innerHTML = `
        <span class="vp-lbl">${s.label}</span>
        <input type="range" class="vp-slider" min="${s.min}" max="${s.max}" step="${s.step}" value="${cur}">
        <span class="vp-val">${cur.toFixed(2)}</span>
      `;
      const slider = sliderRow.querySelector('.vp-slider');
      const val = sliderRow.querySelector('.vp-val');
      slider.oninput = () => {
        const v = parseFloat(slider.value);
        vision[s.obj][s.prop] = v;
        val.textContent = v.toFixed(2);
        applyVision();
      };
      row.appendChild(sliderRow);
    }
    return row;
  }

  // Cache for loaded one-shot motions (so re-clicking is instant)

  function stopAllGameplayActions() {
    const all = [idleAction, walkAction, runAction, danceAction, weaponIdleAction, weaponWalkAction,
                 downSwingAction, axeSwing1Action, axeSwing2Action, downSwing1Action, downSwing2Action, downSwing3Action];
    for (const a of all) { if (a && a.isRunning()) a.fadeOut(0.15); }
  }

  function stopMotionTest() {
    if (motionAction) {
      motionAction.fadeOut(0.15);
      motionAction = null;
    }
  }

  async function playMotion(file) {
    if (!characterMixer || !characterObj) return;
    let clip = motionCache.get(file);
    if (!clip) {
      try {
        const url = MOTION_BASE + file;
        const fbx = await motionFbxLoader.loadAsync(url);
        if (!fbx.animations || fbx.animations.length === 0) {
          console.warn('[Motion] No animation in', file);
          return;
        }
        clip = fbx.animations[0];
        clip.name = file;
        // Strip root motion (XZ) like the other clips
        for (const track of clip.tracks) {
          if (!track.name.endsWith('.position')) continue;
          const bone = track.name.split('.')[0].toLowerCase();
          if (bone.includes('hips') || bone.includes('root') || bone === '') {
            const v = track.values;
            for (let i = 0; i < v.length; i += 3) { v[i] = 0; v[i+2] = 0; }
          }
        }
        motionCache.set(file, clip);
        console.log('[Motion] Loaded', file);
      } catch (err) {
        console.error('[Motion] Failed to load', file, err);
        return;
      }
    }
    // Stop everything else and play this in loop
    stopAllGameplayActions();
    stopMotionTest();
    motionAction = characterMixer.clipAction(clip);
    motionAction.reset();
    motionAction.setLoop(THREE.LoopRepeat);
    motionAction.fadeIn(0.15);
    motionAction.play();
  }

  function resumeGameplayMotion() {
    stopMotionTest();
    const toAction = (typeof getActionForState === 'function') ? getActionForState(moveState) : idleAction;
    if (toAction) {
      toAction.reset();
      toAction.fadeIn(0.15);
      toAction.play();
    }
