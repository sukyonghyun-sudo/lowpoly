    const showing = motionPanel.style.display !== 'none';
    motionPanel.style.display = showing ? 'none' : 'block';
    motionToggleBtn.style.display = showing ? 'block' : 'none';
  };

  const mpGrid = motionPanel.querySelector('.mp-grid');
  for (const m of MOTION_LIST) {
    const btn = document.createElement('button');
    btn.className = 'mp-btn';
    btn.textContent = m.name;
    btn.onclick = () => {
      mpGrid.querySelectorAll('.mp-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      playMotion(m.file);
    };
    mpGrid.appendChild(btn);
  }
  motionPanel.querySelector('.mp-resume').onclick = () => {
    mpGrid.querySelectorAll('.mp-btn').forEach(b => b.classList.remove('active'));
    resumeGameplayMotion();
  };
  motionPanel.querySelector('.mp-close').onclick = (e) => {
    e.stopPropagation();
    motionPanel.style.display = 'none';
    motionToggleBtn.style.display = 'block';
  };

  window.addEventListener('keydown', e => {
    if (e.code === 'KeyM' && !e.repeat) {
      if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
      const showing = motionPanel.style.display !== 'none';
      motionPanel.style.display = showing ? 'none' : 'block';
      motionToggleBtn.style.display = showing ? 'block' : 'none';
    }
  });

  // ===== Game Loop =====
  let lastTime = 0;
  let elapsedTime = 0;

  function animate(timestamp) {
    requestAnimationFrame(animate);
    const rawDt = lastTime ? (timestamp - lastTime) / 1000 : 0;
    lastTime = timestamp;
    if (rawDt <= 0 || rawDt > 0.2) { lastTime = timestamp; return; }
    // Hit stop: when active, dt becomes 0 (animations pause)
    const dt = (window._consumeHitStop ? window._consumeHitStop(rawDt) : rawDt);
    elapsedTime += dt;

    // Always update visual effects on real time (don't freeze them with hit stop)
    if (window._updateBloodDrops) window._updateBloodDrops(rawDt);
    if (window._updatePlayerBloodStains) window._updatePlayerBloodStains(rawDt);
    if (window._updateDamageFlash) window._updateDamageFlash(rawDt);
    if (window._tickShoveCooldown) window._tickShoveCooldown(rawDt);
    if (window._tickComboTargetTimer) window._tickComboTargetTimer(rawDt);
    if (window._tickAttackPush) window._tickAttackPush(rawDt);
    // During an attack, keep facing the target zombie — prevents player from
    // swinging in the wrong direction when zombies move around them.
    if (isAttacking && window._lockFaceTarget) window._lockFaceTarget();

    const t0 = performance.now();
    // 10프레임마다 가까운 충돌 메시만 추림
    nearCollisionFrame++;
    if (nearCollisionFrame >= 10 && characterObj) {
      nearCollisionFrame = 0;
      if (currentMap === 'market') {
        const px = characterObj.position.x;
        const pz = characterObj.position.z;
        nearCollisionMeshes = [];
        for (const mesh of collisionMeshes) {
          const mx = mesh.matrixWorld.elements[12];
          const mz = mesh.matrixWorld.elements[14];
          const dx = px - mx;
          const dz = pz - mz;
          if (dx * dx + dz * dz < 100) {  // 10m 반경
            nearCollisionMeshes.push(mesh);
          }
        }
      } else {
        nearCollisionMeshes = collisionMeshes;
      }
    }
    updateCharacterMovement(dt);
    const t1 = performance.now();
    updateComboTimer(dt);
    if (characterMixer) characterMixer.update(dt);

    // ===== T-pose safety net (PLAYER) =====
    // If no character action has weight > 0.1, force idle.
    if (characterMixer && !isPlayerDead && idleAction) {
      const allActions = [idleAction, walkAction, runAction, danceAction,
        weaponIdleAction, weaponWalkAction, sneakAction,
        downSwingAction, axeSwing1Action, axeSwing2Action,
        downSwingAction, finishAction,
        reaction1Action, reaction2Action, death1Action, death2Action];
      let totalWeight = 0;
      for (const a of allActions) {
        if (a) totalWeight += a.getEffectiveWeight();
      }
      if (totalWeight < 0.1) {
        const safety = (hasWeapon() && weaponIdleAction) ? weaponIdleAction : idleAction;
        if (safety) {
          safety.reset();
          safety.setEffectiveWeight(1);
          safety.play();
        }
      }
    }

    for (const z of zombies) {
      if (z.mixer && z.model.visible) z.mixer.update(dt);
      // ===== T-pose safety net (ZOMBIE) =====
      if (z.mixer && z.model.visible && z.actions['Idle']) {
        let zw = 0;
        for (const key in z.actions) {
          const a = z.actions[key];
          if (a) zw += a.getEffectiveWeight();
        }
        if (zw < 0.1) {
          const a = z.actions['Idle'];
          a.reset(); a.setEffectiveWeight(1); a.play();
        }
      }
    }
    // Zombie AI runs only in market
    if (currentMap === 'market' && window._updateZombieAI) window._updateZombieAI(dt);

    updateDoorAnimations(dt);
    rebuildCollisionIfNeeded();
    updateRoomDetection();
    updateInteractionPrompt();
    updateLighting(dt);
    updateCamera(dt);
    if (window._updateRain) window._updateRain(dt);
    updateCameraOcclusion(dt, camera);
    const t2 = performance.now();
    if (weaponWheel) weaponWheel.update(dt);

    // === Distance Culling — DISABLED ===
    // The popping-in/out behavior was causing visible flicker on road
    // segments, grass patches, and other ground meshes that aren't correctly
    // classified as "floor". Disabled until a per-mesh approach (frustum
    // culling + LOD) can replace it.
    // Force everything visible once.
    if (characterObj && currentMap === 'market' && !window._marketCullDisabled) {
      window._marketCullDisabled = true;
      for (const { mesh, id } of stageMeshes) {
        if (HIDDEN_MESH_IDS && HIDDEN_MESH_IDS.includes && HIDDEN_MESH_IDS.includes(id)) continue;
        mesh.visible = true;
      }
    }

    // Render
    if (bloomEnabled) {
      composer.render();
    } else {
      renderer.render(scene, camera);
    }
    drawMinimap();
    updateSpawnLive();
    const t3 = performance.now();

    if (Math.random() < 0.02) {
      console.log(`Move: ${(t1-t0).toFixed(1)}ms | Occlusion: ${(t2-t1).toFixed(1)}ms | Render: ${(t3-t2).toFixed(1)}ms`);
    }
  }

  requestAnimationFrame(animate);

  setInterval(() => {
    console.log(`Triangles: ${renderer.info.render.triangles} | DrawCalls: ${renderer.info.render.calls} | Textures: ${renderer.info.memory.textures} | Geometries: ${renderer.info.memory.geometries}`);
  }, 3000);

  // =========================================================================
  //  UPDATE FUNCTIONS
  // =========================================================================

  function updateCharacterMovement(dt) {
    if (!characterObj) return;

    // Dead = freeze
    if (isPlayerDead) return;

    // While dancing, attacking, reacting to hit, or weapon wheel open, block movement input
    if (isDancing || isAttacking || isReacting || (weaponWheel && weaponWheel.isOpen)) {
      pushOutOfCollision(characterObj.position);
      pushOutOfZombies(characterObj.position);
      clampToMapBounds(characterObj.position);
      // Ground height detection (reuse cached raycaster & floor meshes)
      _groundOrigin.set(characterObj.position.x, 50, characterObj.position.z);
      _groundRaycaster.set(_groundOrigin, _groundDir);
      _groundRaycaster.far = 100;
      _groundRaycaster.near = 0;
      const gTarget = floorMeshArray.length > 0 ? floorMeshArray : occlusionMeshArray;
      const gHits = _groundRaycaster.intersectObjects(gTarget, currentMap !== 'market');
      for (const hit of gHits) {
        if (!hit.object.isSkinnedMesh && hit.object.visible) {
          characterObj.position.y = hit.point.y;
          break;
        }
      }
      return;
    }

    // Quarter-view direction correction using current azimuth
    const cosA = Math.cos(-cam.azimuth);
    const sinA = Math.sin(-cam.azimuth);

    let inputX = 0, inputZ = 0;
    if (keysPressed['KeyW'] || keysPressed['ArrowUp'])    inputZ -= 1;
    if (keysPressed['KeyS'] || keysPressed['ArrowDown'])  inputZ += 1;
    if (keysPressed['KeyA'] || keysPressed['ArrowLeft'])  inputX -= 1;
    if (keysPressed['KeyD'] || keysPressed['ArrowRight']) inputX += 1;

    const wantsToMove = (inputX !== 0 || inputZ !== 0);
    const running = keysPressed['ShiftLeft'] || keysPressed['ShiftRight'];
    // Use moveCfg multipliers if the move panel has been initialised
    const sneakFactor = (typeof window !== 'undefined' && window._sneakMult) ? window._sneakMult() : 0.65;
    let speed;
    if (isSneaking) speed = CHAR_MOVE_SPEED * sneakFactor;
    else if (running) speed = CHAR_RUN_SPEED;
    else speed = CHAR_MOVE_SPEED * (hasWeapon() ? 1.15 : 1.0);

    if (wantsToMove) {
      const len = Math.sqrt(inputX * inputX + inputZ * inputZ);
      inputX /= len;
      inputZ /= len;

      const worldX = inputX * cosA - inputZ * sinA;
      const worldZ = inputX * sinA + inputZ * cosA;

      const displacement = new THREE.Vector3(
        worldX * speed * dt,
        0,
        worldZ * speed * dt
      );
      const newPos = moveWithCollision(characterObj.position, displacement);
      characterObj.position.copy(newPos);

      const targetAngle = Math.atan2(worldX, worldZ);
      const targetQuat = new THREE.Quaternion().setFromAxisAngle(
        new THREE.Vector3(0, 1, 0), targetAngle
      );
      characterObj.quaternion.slerp(targetQuat, 1 - Math.exp(-CHAR_TURN_SPEED * dt));
    }

    pushOutOfCollision(characterObj.position);
    pushOutOfZombies(characterObj.position);
    clampToMapBounds(characterObj.position);

    // Ground height detection via raycast.
    // Strategy: in the market, raycast against ALL visible non-floor meshes
    // too, because some shop-front patches (e.g. cafe entrance pavement) are
    // not classified as "floor" by detectFloorMeshes, so a floor-only raycast
    // misses them and the player sinks into the next layer below. Picking the
    // highest qualifying hit gives natural step-up behaviour.
    _groundOrigin.set(characterObj.position.x, 50, characterObj.position.z);
    _groundRaycaster.set(_groundOrigin, _groundDir);
    _groundRaycaster.far = 100;
    _groundRaycaster.near = 0;
    let groundTarget;
    if (currentMap === 'market') {
      // floors + occlusion meshes (occlusion = all stage meshes minus floors+hidden+open-doors)
      groundTarget = floorMeshArray.concat(occlusionMeshArray);
    } else {
      groundTarget = floorMeshArray.length > 0 ? floorMeshArray : occlusionMeshArray;
    }
    const groundHits = _groundRaycaster.intersectObjects(groundTarget, currentMap !== 'market');
    let bestY = null;
    const prevY = characterObj.position.y;
    const MAX_STEP_UP = 0.6;     // smooth step over small obstacles
    const MAX_DROP = 1.5;
    for (const hit of groundHits) {
      if (hit.object.isSkinnedMesh) continue;
      if (!hit.object.visible) continue;
      const y = hit.point.y;
      if (currentMap === 'market') {
        if ((prevY - y) > MAX_DROP) continue;
        if ((y - prevY) > MAX_STEP_UP) continue;
      }
      if (bestY === null || y > bestY) bestY = y;
    }
    if (bestY !== null) {
      // Smooth step-up — don't snap Y instantly, lerp toward target so going
      // over curbs/low steps doesn't visually jump.
      if (currentMap === 'market' && bestY > prevY) {
        characterObj.position.y = prevY + (bestY - prevY) * Math.min(1, dt * 12);
      } else {
        characterObj.position.y = bestY;
      }
    }

    let desiredState = 'idle';
    if (wantsToMove) {
      if (isSneaking) desiredState = 'sneak';
      else if (running) desiredState = 'run';
      else desiredState = 'walk';
    } else {
      // Stationary: stay in 'sneak-idle' (frozen sneak frame) if toggled on,
      // otherwise normal idle.
      if (isSneaking) desiredState = 'sneak-idle';
    }

    if (desiredState !== moveState) {
      const prev = moveState;
      moveState = desiredState;
      const fromAction = getActionForState(prev);
      const toAction = getActionForState(desiredState);

      // Special case: sneak → sneak-idle (or vice versa) uses the SAME action.
      // The default else-branch below would call reset() and snap time to 0,
      // which is exactly what we want to avoid. Just toggle paused.
      const isSneakInternal = (
        (prev === 'sneak' && desiredState === 'sneak-idle') ||
        (prev === 'sneak-idle' && desiredState === 'sneak')
      );
      const sneakIdleT = (typeof window !== 'undefined' && window._sneakIdleTime) ? window._sneakIdleTime() : 0;
      if (isSneakInternal && toAction) {
        if (desiredState === 'sneak-idle') {
          // If user has set a specific freeze frame > 0, jump to it.
          // Otherwise keep the current frame (current behavior).
          if (sneakIdleT > 0.001) toAction.time = sneakIdleT;
          toAction.paused = true;
        } else {
          toAction.paused = false;
        }
      } else if (fromAction && toAction && fromAction !== toAction) {
        toAction.reset();
        toAction.play();
        fromAction.crossFadeTo(toAction, 0.2, true);
        if (desiredState === 'sneak-idle') {
          if (sneakIdleT > 0.001) toAction.time = sneakIdleT;
          toAction.paused = true;
        } else {
          toAction.paused = false;
        }
      } else if (toAction) {
        toAction.reset().play();
        if (desiredState === 'sneak-idle') {
          if (sneakIdleT > 0.001) toAction.time = sneakIdleT;
          toAction.paused = true;
        } else toAction.paused = false;
      }
    } else if (moveState === 'sneak-idle' && sneakAction) {
      sneakAction.paused = true;
    }
  }

  function hasWeapon() {
    return weaponWheel && weaponWheel.equippedWeapon;
  }

  function getActionForState(state) {
    switch (state) {
      case 'run': return runAction;
      case 'walk': return (hasWeapon() && weaponWalkAction) ? weaponWalkAction : walkAction;
      case 'sneak': return sneakAction || walkAction;
      // sneak-idle: same sneak animation but paused (handled in state change below)
      case 'sneak-idle': return sneakAction || idleAction;
      case 'attack': return downSwingAction;
      case 'combo': return comboChain.length > 0 ? comboChain[0] : downSwingAction;
      case 'dance': return danceAction;
      default:
        return (hasWeapon() && weaponIdleAction) ? weaponIdleAction : idleAction;
    }
  }

  // Reset a combo action and start it with fadeIn (avoids crossFadeTo timeScale interference)
  // Order: reset → play → fadeIn → timeScale (set AFTER play to prevent play() from overriding)
  function comboResetPlay(action, stepIdx, fadeDur) {
    action.reset();
    action.play();
    action.fadeIn(fadeDur || comboCrossFade);
    if (comboTimeScales.length > stepIdx) {
      action.timeScale = comboTimeScales[stepIdx];
    }
    // Skip first 20% of 3rd hit (stepIdx 2) to jump past wind-up
    if (stepIdx === 2) {
      const clip = action.getClip();
      if (clip && clip.duration > 0) {
        action.time = clip.duration * 0.2;
      }
    }
  }

  function startCombo(chain, noEarlyCancel = false, crossFadeDur = 0.05, timeScales = []) {
    isAttacking = true;
    if (window._setAttackPush) window._setAttackPush(0.5); // active for ~half second
    comboStep = 1;
    comboBuffered = false;
    comboTimer = 0;
    comboChain = chain;
    comboNoEarlyCancel = noEarlyCancel;
    comboCrossFade = crossFadeDur;
    comboTimeScales = timeScales;
    const firstAction = chain[0];
    const fromAction = getActionForState(moveState);
    moveState = 'combo';
    if (fromAction) {
      comboResetPlay(firstAction, 0, 0.05);
      fromAction.fadeOut(0.05);
    } else {
      comboResetPlay(firstAction, 0, 0.05);
    }
    // Impact frame system: damage is dealt in updateComboTimer when animation reaches impact point
    // Each combo step tracks whether its damage has already fired
    comboHitFired = [];
    for (let i = 0; i < chain.length; i++) comboHitFired.push(false);
  }

  // ===== Soft Targeting: auto-rotate toward best target on attack =====
  const SOFT_TARGET_RANGE = 2.5;    // scan radius
  const SOFT_TARGET_ARC = 140;      // degrees — generous front arc
  const LUNGE_DIST = 0.2;           // small forward step on attack

  function softTarget() {
    if (!characterObj || zombies.length === 0) return;
    const px = characterObj.position.x;
    const pz = characterObj.position.z;
    const facing = characterObj.rotation.y;
    const fx = Math.sin(facing);
    const fz = Math.cos(facing);

    let bestScore = -Infinity;
    let bestZ = null;
    for (const z of zombies) {
      if (!z.model.visible || z.aiState === 'dead') continue;
      const dx = z.model.position.x - px;
      const dz = z.model.position.z - pz;
      const d = Math.sqrt(dx * dx + dz * dz);
      if (d > SOFT_TARGET_RANGE || d < 0.01) continue;
      // Score: heavily favor closer targets, slightly favor forward
      const dot = (dx / d) * fx + (dz / d) * fz;
      const score = (1.0 - d / SOFT_TARGET_RANGE) * 3.0 + dot;
      if (score > bestScore) {
        bestScore = score;
        bestZ = z;
      }
    }

    if (bestZ) {
      // Rotate toward target
      const dx = bestZ.model.position.x - px;
      const dz = bestZ.model.position.z - pz;
      const targetAngle = Math.atan2(dx, dz);
      characterObj.rotation.y = targetAngle;

      // Save as combo target so dealDamageToNearby picks the SAME zombie
      if (window._setComboTarget) window._setComboTarget(bestZ);

      // Lunge: small step toward target
      const d = Math.sqrt(dx * dx + dz * dz);
      if (d > 1.0 && d < SOFT_TARGET_RANGE) {
        const lungeX = (dx / d) * LUNGE_DIST;
        const lungeZ = (dz / d) * LUNGE_DIST;
        characterObj.position.x += lungeX;
        characterObj.position.z += lungeZ;
      }
    }
  }

  function handleAttack() {
    if (!characterObj) return;
    if (isPlayerDead) return;
    if (!weaponWheel || !weaponWheel.equippedWeapon) return;
    if (isDancing) return;
    if (weaponWheel.isOpen) return;

    // Soft targeting: always rotate toward best target
    softTarget();

    // === Finish attack on nearby crawling zombie ===
    if (!isAttacking && finishAction) {
      const px = characterObj.position.x;
      const pz = characterObj.position.z;
      let closestCrawler = null;
      let closestDist = 1.5; // finish range — must be very close (stomp distance)
      for (const z of zombies) {
        if (!z.model.visible || z.aiState === 'dead') continue;
        if (!z.isCrawler) continue;
        const dx = z.model.position.x - px;
        const dz = z.model.position.z - pz;
        const d = Math.sqrt(dx * dx + dz * dz);
        if (d < closestDist) {
          closestDist = d;
          closestCrawler = z;
        }
      }
      if (closestCrawler) {
        // Face the crawler
        const dx = closestCrawler.model.position.x - px;
        const dz = closestCrawler.model.position.z - pz;
        characterObj.rotation.y = Math.atan2(dx, dz);

        // Stop the crawler immediately
        if (closestCrawler.actions['Crawl']) {
          closestCrawler.actions['Crawl'].paused = true;
        }
        closestCrawler.aiState = 'hit'; // prevent movement

        // Play finish animation
        isAttacking = true;
        if (window._setAttackPush) window._setAttackPush(0.8);
        comboChain = [];
        comboStep = 0;
        const fromAction = getActionForState(moveState);
        moveState = 'attack';
        finishAction.stop();
        finishAction.setEffectiveWeight(1);
        finishAction.setEffectiveTimeScale(1);
        finishAction.reset();
        finishAction.play();
        if (fromAction) fromAction.fadeOut(0.08);

        // Deal big damage at impact frame
        const finishTarget = closestCrawler;
        const finishClip = finishAction.getClip();
        let finishHitDone = false;
        const checkFinishImpact = () => {
          if (finishHitDone) return;
          if (!finishAction.isRunning()) return;
          const prog = finishAction.time / finishClip.duration;
          if (prog >= 0.45) {
            finishHitDone = true;
            // Massive damage
            if (window._damageZombie) window._damageZombie(finishTarget, 300);
            if (window._spawnBloodHit) window._spawnBloodHit(finishTarget.model.position, false);
            if (window._shakeCamera) window._shakeCamera(window._hitShakeIntensity || 0.4, 0.25);
            if (window._hitStop) window._hitStop(window._hitStopDuration || 0.08);
            if (window._zoomPunch) window._zoomPunch();
          }
          if (prog < 1.0) requestAnimationFrame(checkFinishImpact);
        };
        requestAnimationFrame(checkFinishImpact);

        // On finish complete: freeze zombie at chosen frame, return player to idle
        const onFinishDone = (e) => {
          if (e.action === finishAction) {
            characterMixer.removeEventListener('finished', onFinishDone);
            isAttacking = false;
            moveState = 'idle';
            const restore = getActionForState('idle');
            if (restore) {
              restore.reset();
              restore.play();
              finishAction.crossFadeTo(restore, 0.15, true);
            }
            // Freeze the zombie at the chosen frame
            if (finishTarget.aiState === 'dead') {
              if (finishTarget.isCrawler && finishTarget.actions['Crawl']) {
                // Crawler: freeze in crawl pose
                const crawlAct = finishTarget.actions['Crawl'];
                const crawlClip = crawlAct.getClip();
                if (crawlClip) {
                  crawlAct.time = crawlClip.duration * (window._finishFreezeFrame || 0.85);
                  crawlAct.paused = true;
                }
              } else if (finishTarget.actions['Death']) {
                const deathAct = finishTarget.actions['Death'];
                const deathClip = deathAct.getClip();
                if (deathClip) {
                  deathAct.time = deathClip.duration * (window._finishFreezeFrame || 0.85);
                  deathAct.paused = true;
                }
              }
            }
          }
        };
        characterMixer.addEventListener('finished', onFinishDone);
        return; // don't continue to normal attack
      }
    }

    // If sneaking, attack cancels the sneak — and we do NOT auto-return to it.
    // The user has to press C again if they want to sneak afterwards.
    if (isSneaking) {
      isSneaking = false;
      if (weaponWheel) weaponWheel.setSneak(false);
      console.log('[Sneak] disabled by attack');
    }

    const weaponId = weaponWheel.equippedWeapon.id;

    // --- Determine combo chain for this weapon ---
    let chain = null;
    let chainTimeScales = [];
    if (weaponId === 'bat' && downSwingAction && downSwing2Action) {
      chain = [downSwingAction, downSwing2Action]; // 2-hit combo
      chainTimeScales = [1.40, 1.40];
    } else if (weaponId === 'axe' && axeSwing1Action && axeSwing2Action) {
      chain = [axeSwing1Action, axeSwing2Action]; // 2-hit
      chainTimeScales = [1.40, 1.40];
    }

    if (chain) {
      // Determine per-weapon combo options
      const isBat = (weaponId === 'bat');
      const noEarly = isBat;          // bat: no early cancel, wait for 100%
      const cfDur = isBat ? 0.1 : 0.05; // bat: 0.1s crossFade, axe: 0.05s

      // --- Combo weapon ---
      // During current hit: buffer the next
      if (isAttacking && comboStep >= 1 && comboStep <= comboChain.length) {
        // If not on the last hit, allow buffering
        if (comboStep < comboChain.length) {
          comboBuffered = true;
        }
        // If on last hit, ignore
        return;
      }
      // Combo window (between hits): chain to next immediately
      if (isAttacking && comboStep === -1) {
        const nextIdx = comboLastStep + 1;
        if (nextIdx < comboChain.length && comboChain[nextIdx]) {
          comboStep = nextIdx + 1;
          comboBuffered = false;
          comboTimer = 0;
          const nextAction = comboChain[nextIdx];
          const prevAction = comboChain[comboLastStep];
          comboResetPlay(nextAction, nextIdx);
          prevAction.fadeOut(comboCrossFade);
        }
        return;
      }
      // Already attacking (other state)
      if (isAttacking) return;

      // Start combo
      startCombo(chain, noEarly, cfDur, chainTimeScales);
      return;
    }

    // --- Default single attack (down_swing) ---
    if (!downSwingAction) return;
    if (isAttacking) return;

    isAttacking = true;
    if (window._setAttackPush) window._setAttackPush(0.5);
    comboStep = 0;
    comboChain = [];
    window._singleHitFired = false; // reset for impact frame detection
    const fromAction = getActionForState(moveState);
    moveState = 'attack';
    if (fromAction) {
      downSwingAction.reset();
      downSwingAction.play();
      downSwingAction.timeScale = 1.40;
      fromAction.crossFadeTo(downSwingAction, 0.1, true);
    } else {
      downSwingAction.reset().play();
      downSwingAction.timeScale = 1.40;
    }
  }

  function updateComboTimer(dt) {
    if (!isAttacking) return;

    // === Impact frame hit detection for ALL attacks (combo + single) ===
    // For combo attacks: check current step's animation progress
    if (comboChain.length > 0 && comboStep >= 1) {
      const stepIdx = comboStep - 1;
      const currentAction = comboChain[stepIdx];
      if (currentAction && !comboHitFired[stepIdx]) {
        const clip = currentAction.getClip();
        if (clip && clip.duration > 0) {
          const progress = currentAction.time / clip.duration;
          const impactAt = stepIdx >= 1 ? IMPACT_FRAME_FAST : IMPACT_FRAME;
          if (progress >= impactAt) {
            comboHitFired[stepIdx] = true;
            if (window._dealDamageToNearby) window._dealDamageToNearby();
          }
        }
      }
    }
    // For single attack (down_swing, no combo):
    if (comboChain.length === 0 && downSwingAction && !window._singleHitFired) {
      const clip = downSwingAction.getClip();
      if (clip && clip.duration > 0) {
        const progress = downSwingAction.time / clip.duration;
        if (progress >= IMPACT_FRAME) {
          window._singleHitFired = true;
          if (window._dealDamageToNearby) window._dealDamageToNearby();
        }
      }
    }

    if (comboChain.length === 0) return;

    // Early cancel: during current hit with buffered input, chain at COMBO_EARLY_CANCEL progress
    // Skip early cancel for weapons that require full animation completion (e.g. bat)
    if (comboStep >= 1 && comboBuffered && !comboNoEarlyCancel) {
      const stepIdx = comboStep - 1;
      const nextIdx = stepIdx + 1;
      if (nextIdx < comboChain.length && comboChain[stepIdx] && comboChain[nextIdx]) {
        const currentAction = comboChain[stepIdx];
        const clip = currentAction.getClip();
        if (clip && clip.duration > 0) {
          const progress = currentAction.time / clip.duration;
          if (progress >= COMBO_EARLY_CANCEL) {
            comboStep = nextIdx + 1;
            comboBuffered = false;
            comboTimer = 0;
            const nextAction = comboChain[nextIdx];
            comboResetPlay(nextAction, nextIdx);
            currentAction.fadeOut(comboCrossFade);
            return;
          }
        }
      }
    }

    // No-early-cancel weapons (e.g. bat): poll for 100% completion to chain next hit
    if (comboStep >= 1 && comboNoEarlyCancel) {
      const stepIdx = comboStep - 1;
      const currentAction = comboChain[stepIdx];
      if (currentAction) {
        const clip = currentAction.getClip();
        if (clip && clip.duration > 0) {
          const progress = currentAction.time / clip.duration;
          if (progress >= 0.99) {
            const nextIdx = stepIdx + 1;
            if (nextIdx < comboChain.length) {
              if (comboBuffered && comboChain[nextIdx]) {
                comboStep = nextIdx + 1;
                comboBuffered = false;
                comboTimer = 0;
                const nextAction = comboChain[nextIdx];
                comboResetPlay(nextAction, nextIdx);
                currentAction.fadeOut(comboCrossFade);
              } else {
                comboTimer = 0;
                comboLastStep = stepIdx;
                comboStep = -1;
              }
            } else {
              isAttacking = false;
              comboStep = 0;
              comboBuffered = false;
              comboTimer = 0;
              comboChain = [];
              comboHitFired = [];
              const toAction = (hasWeapon() && weaponIdleAction) ? weaponIdleAction : idleAction;
              if (toAction) {
                toAction.reset();
                toAction.play();
                currentAction.crossFadeTo(toAction, 0.2, true);
              }
              moveState = 'idle';
            }
            return;
          }
        }
      }
    }

    // comboStep === -1 means current hit finished, waiting for click within COMBO_WINDOW
    if (comboStep !== -1) return;
    comboTimer += dt;
    if (comboTimer >= COMBO_WINDOW) {
      const fromAction = comboChain[comboLastStep];
      isAttacking = false;
      comboStep = 0;
      comboBuffered = false;
      comboTimer = 0;
      comboChain = [];
      comboHitFired = [];
      const toAction = (hasWeapon() && weaponIdleAction) ? weaponIdleAction : idleAction;
      if (fromAction && toAction) {
        toAction.reset();
        toAction.play();
        fromAction.crossFadeTo(toAction, 0.2, true);
      }
      moveState = 'idle';
    }
  }

  function handleDanceToggle() {
    if (!characterObj || !danceAction) return;

    if (isDancing) {
      // Cancel dance → return to idle
      isDancing = false;
      const toAction = (hasWeapon() && weaponIdleAction) ? weaponIdleAction : idleAction;
      if (danceAction && toAction) {
        toAction.reset();
        toAction.play();
        danceAction.crossFadeTo(toAction, 0.3, true);
      }
      moveState = 'idle';
    } else {
      // Start dance
      isDancing = true;
      const fromAction = getActionForState(moveState);
      moveState = 'dance';
      if (fromAction && danceAction) {
        danceAction.reset();
        danceAction.play();
        fromAction.crossFadeTo(danceAction, 0.3, true);
      } else if (danceAction) {
        danceAction.reset().play();
      }
    }
  }

  function updateDoorAnimations(dt) {
    for (const door of doorEntries) {
      if (!door.animating) continue;
      door.animTime += door.animDir * (dt / DOOR_ANIM_DURATION);
      if (door.animTime >= 1) {
        door.animTime = 1;
        door.animating = false;
        door.isOpen = true;
      } else if (door.animTime <= 0) {
        door.animTime = 0;
        door.animating = false;
        door.isOpen = false;
      }
      const t = easeInOutCubic(door.animTime);
      door.pivot.rotation.y = door.openAngle * t;
    }
  }

  let lastDoorStates = null;
  function rebuildCollisionIfNeeded() {
    const stateKey = doorEntries.map(d => d.isOpen ? '1' : '0').join('');
    if (stateKey !== lastDoorStates) {
      lastDoorStates = stateKey;
      rebuildCollisionMeshes();
    }
  }

  function updateRoomDetection() {
    if (!characterObj) return;
    if (currentMap !== 'house') return; // Skip room detection on non-house maps
    const px = characterObj.position.x;
    const pz = characterObj.position.z;

    let found = null;
    for (const room of ROOMS) {
      if (px >= room.min[0] && px <= room.max[0] &&
          pz >= room.min[1] && pz <= room.max[1]) {
        found = room;
        break;
      }
    }

    if (found !== currentRoom) {
      currentRoom = found;
      if (found) {
        roomNameEl.textContent = found.name;
        cam.targetDist = cam.defaultDist * found.zoom;
      } else {
        roomNameEl.textContent = '🏠';
        cam.targetDist = cam.defaultDist;
      }
    }
  }

  function updateInteractionPrompt() {
    if (!characterObj) { hidePrompt(); return; }

    nearestInteractable = null;
    let bestDist = Infinity;

    for (const door of doorEntries) {
      const doorWorldPos = new THREE.Vector3();
      door.pivot.getWorldPosition(doorWorldPos);
      const dist = characterObj.position.distanceTo(doorWorldPos);
      if (dist < DOOR_INTERACT_DIST && dist < bestDist) {
        bestDist = dist;
        const label = door.isOpen ? '[E] 문 닫기' : '[E] 문 열기';
        nearestInteractable = { type: 'door', data: door, label };
      }
    }

    if (nearestInteractable) {
      promptEl.textContent = nearestInteractable.label;
      promptEl.classList.add('visible');
    } else {
      hidePrompt();
    }
  }

  function hidePrompt() {
    promptEl.classList.remove('visible');
  }

  // ===== Lighting update (smooth lerp to targets) =====
  function updateLighting(dt) {
    const s = Math.min(dt * 1.8, 1);

    // Background color
    scene.background.lerp(lightTarget.bgColor, s);

    // Ambient
    ambientLight.color.lerp(lightTarget.ambientColor, s);
    ambientLight.intensity += (lightTarget.ambientIntensity - ambientLight.intensity) * s;

    // Sun (color, intensity, position)
    sunLight.color.lerp(lightTarget.sunColor, s);
    sunLight.intensity += (lightTarget.sunIntensity - sunLight.intensity) * s;
    sunLight.position.lerp(lightTarget.sunPos, s);

    // === Shadow camera tracking (market only) ===
    // The shadow camera frustum is small (±20m) — fine for the house, but in
    // the open market it leaves a visible boundary where the floor texture
    // outside the shadow region looks "different". Move the light AND its
    // target so the shadow follows the player, preserving the sun direction.
    if (characterObj && sunLight.target) {
      if (currentMap === 'market') {
        // Sun direction = (light.position - origin), since target was at origin.
        // We want to keep this direction but translate both light + target so
        // the frustum is centred on the player.
        const dirOffset = sunLight.userData.dirOffset || new THREE.Vector3(-20, 35, 15);
        sunLight.target.position.set(
          characterObj.position.x,
          characterObj.position.y,
          characterObj.position.z
        );
        sunLight.position.set(
          characterObj.position.x + dirOffset.x,
          characterObj.position.y + dirOffset.y,
          characterObj.position.z + dirOffset.z
        );
        // Use a much larger shadow camera frustum on the open market map so
        // shadows cover the visible area (avoids the V-shaped "shadow boundary"
        // artefacts on the grass beyond the previous ±20m frustum).
        if (!sunLight.shadow.camera._marketFrustum) {
          sunLight.shadow.camera.left = -100;
          sunLight.shadow.camera.right = 100;
          sunLight.shadow.camera.top = 100;
          sunLight.shadow.camera.bottom = -100;
          sunLight.shadow.camera.far = 300;
          sunLight.shadow.camera._marketFrustum = true;
          sunLight.shadow.camera._houseFrustum = false;
          sunLight.shadow.camera.updateProjectionMatrix();
        }
        sunLight.target.updateMatrixWorld();
      } else {
        // House: smaller frustum at origin (default behavior)
        sunLight.target.position.set(0, 0, 0);
        sunLight.target.updateMatrixWorld();
        if (!sunLight.shadow.camera._houseFrustum) {
          sunLight.shadow.camera.left = -20;
          sunLight.shadow.camera.right = 20;
          sunLight.shadow.camera.top = 20;
          sunLight.shadow.camera.bottom = -20;
          sunLight.shadow.camera.far = 80;
          sunLight.shadow.camera._houseFrustum = true;
          sunLight.shadow.camera._marketFrustum = false;
          sunLight.shadow.camera.updateProjectionMatrix();
        }
      }
    }

    // Hemisphere
    hemiLight.color.lerp(lightTarget.hemiSky, s);
    hemiLight.groundColor.lerp(lightTarget.hemiGround, s);
    hemiLight.intensity += (lightTarget.hemiIntensity - hemiLight.intensity) * s;

    // Room ceiling lights
    for (const rl of roomLightsArr) {
      rl.color.lerp(lightTarget.roomColor, s);
      rl.intensity += (lightTarget.roomIntensity - rl.intensity) * s;
      rl.distance += (lightTarget.roomDistance - rl.distance) * s;
    }

    // Accent lights
    for (const al of accentLightsArr) {
      al.color.lerp(lightTarget.accentColor, s);
      al.intensity += (lightTarget.accentIntensity - al.intensity) * s;
      al.distance += (lightTarget.accentDistance - al.distance) * s;
    }

    // Exposure
    const targetExposure = lightTarget.exposure;
    renderer.toneMappingExposure += (targetExposure - renderer.toneMappingExposure) * s;
  }

  // ===== Camera occlusion transparency =====
  const _occludeRaycaster = new THREE.Raycaster();
  const _occludeTargetPos = new THREE.Vector3();

  function updateCameraOcclusion(dt, camObj) {
    if (!characterObj) return;

    _occludeTargetPos.set(
      characterObj.position.x,
      characterObj.position.y + CHAR_HEIGHT,
      characterObj.position.z
    );

    const dir = _occludeTargetPos.clone().sub(camObj.position);
    const dist = dir.length();
    dir.normalize();

    _occludeRaycaster.set(camObj.position, dir);
    _occludeRaycaster.far = dist;
    _occludeRaycaster.near = 0;

    const hits = _occludeRaycaster.intersectObjects(occlusionMeshArray, true);

    const blockingNow = new Set();
    for (const hit of hits) {
      let obj = hit.object;
      while (obj) {
        const id = obj.userData._meshId;
        if (id !== undefined && !floorMeshIds.has(id)) {
          blockingNow.add(obj);
          break;
        }
        obj = obj.parent;
      }
    }

    for (const mesh of blockingNow) {
      if (!occludedMeshes.has(mesh)) {
        const originals = [];
        if (Array.isArray(mesh.material)) {
          const cloned = mesh.material.map(m => {
            originals.push(m);
            const c = m.clone();
            c.transparent = true;
            c.depthWrite = true;
            c.needsUpdate = true;
            return c;
          });
          mesh.material = cloned;
        } else {
          originals.push(mesh.material);
          const c = mesh.material.clone();
          c.transparent = true;
          c.depthWrite = true;
          c.needsUpdate = true;
          mesh.material = c;
        }
        occludedMeshes.set(mesh, { originalMaterials: originals, currentOpacity: 1.0 });
      }
    }

    for (const [mesh, state] of occludedMeshes) {
      const isBlocking = blockingNow.has(mesh);
      const targetOpacity = isBlocking ? OCCLUDE_OPACITY : 1.0;
      state.currentOpacity += (targetOpacity - state.currentOpacity) * (1 - Math.exp(-OCCLUDE_FADE_SPEED * dt));

      if (Array.isArray(mesh.material)) {
        for (const mat of mesh.material) mat.opacity = state.currentOpacity;
      } else {
        mesh.material.opacity = state.currentOpacity;
      }

      if (!isBlocking && state.currentOpacity > 0.99) {
        if (Array.isArray(mesh.material)) {
          for (const mat of mesh.material) mat.dispose();
          mesh.material = state.originalMaterials.length > 1 ? state.originalMaterials : state.originalMaterials[0];
        } else {
          mesh.material.dispose();
          mesh.material = state.originalMaterials[0];
        }
        occludedMeshes.delete(mesh);
      }
    }
  }

  // ===== Camera update =====
  function updateCamera(dt) {
    if (!characterObj) return;

    // Smooth follow
    const targetPos = characterObj.position.clone();
    targetPos.y += cam.heightOffset;
    cam.lookAt.lerp(targetPos, 1 - Math.exp(-cam.followSpeed * dt));

    // Smooth zoom (targetDist adjusted by scroll zoom)
    const effectiveDist = cam.targetDist / cam.zoom;
    cam.dist += (effectiveDist - cam.dist) * (1 - Math.exp(-3 * dt));

    // Compute camera position from spherical coords (azimuth is draggable)
    // Apply zoom punch offset to distance
    let zoomDist = cam.dist;
    if (window._getZoomPunchOffset) {
      zoomDist += window._getZoomPunchOffset(dt);
    }
    const offX = zoomDist * Math.cos(cam.elevation) * Math.sin(cam.azimuth);
    const offY = zoomDist * Math.sin(cam.elevation);
    const offZ = zoomDist * Math.cos(cam.elevation) * Math.cos(cam.azimuth);

    camera.position.set(
      cam.lookAt.x + offX,
      cam.lookAt.y + offY,
      cam.lookAt.z + offZ
    );

    // Apply camera shake offset (visual only, doesn't affect lookAt)
    if (window._getCameraShakeOffset) {
      const shakeOff = window._getCameraShakeOffset(dt);
      camera.position.x += shakeOff.x;
      camera.position.y += shakeOff.y;
      camera.position.z += shakeOff.z;
    }

    // Clamp camera within map bounds
    camera.position.x = Math.max(mapBoundsMinX, Math.min(mapBoundsMaxX, camera.position.x));
    camera.position.z = Math.max(mapBoundsMinZ, Math.min(mapBoundsMaxZ, camera.position.z));

    camera.lookAt(cam.lookAt);
  }

}

// =========================================================================
//  FLOOR DETECTION
// =========================================================================
function detectFloorMeshes(isMarket = false) {
  const upVec = new THREE.Vector3(0, 1, 0);
  // Market floors can be merged with thicker geometry (curbs, slight elevation
  // changes) — relax the thickness limit to catch them.
  const maxThickness = isMarket ? 2.0 : 0.5;
  const maxFlatRatio = isMarket ? 0.3 : 0.15;
  for (const { mesh, id } of stageMeshes) {
    if (!mesh.geometry) continue;
    mesh.updateWorldMatrix(true, true);
    const box = new THREE.Box3().setFromObject(mesh);
    const size = box.getSize(new THREE.Vector3());
    const xzSpread = Math.max(size.x, size.z);
    if (xzSpread < 0.01) continue;
    const flatRatio = size.y / xzSpread;
    if (flatRatio < maxFlatRatio && size.y < maxThickness) {
      const geo = mesh.geometry;
      const normal = geo.getAttribute('normal');
      if (normal) {
        const normalMatrix = new THREE.Matrix3().getNormalMatrix(mesh.matrixWorld);
        let upCount = 0;
        let total = 0;
        const n = new THREE.Vector3();
        // Sample at most 200 vertices for speed on big meshes
        const stride = Math.max(1, Math.floor(normal.count / 200));
        for (let i = 0; i < normal.count; i += stride) {
          n.set(normal.getX(i), normal.getY(i), normal.getZ(i));
          n.applyMatrix3(normalMatrix).normalize();
          if (n.dot(upVec) > 0.7) upCount++;
          total++;
        }
        if (total > 0 && upCount / total > 0.5) {
          floorMeshIds.add(id);
        }
      } else {
        floorMeshIds.add(id);
      }
    }
  }
  // Cache floor mesh array for ground raycast
  floorMeshArray = stageMeshes.filter(s => floorMeshIds.has(s.id)).map(s => s.mesh);
  console.log(`[Collision] Detected ${floorMeshIds.size} floor meshes:`, [...floorMeshIds]);
}

// =========================================================================
//  COLLISION MESH LIST
// =========================================================================
function rebuildCollisionMeshes() {
  const openDoorIds = new Set();
  for (const door of doorEntries) {
    if (door.isOpen) openDoorIds.add(door.meshId);
  }

  collisionMeshes = [];
  for (const { mesh, id } of stageMeshes) {
    if (HIDDEN_MESH_IDS.includes(id)) continue;
    if (floorMeshIds.has(id)) continue;
    if (openDoorIds.has(id)) continue;
    collisionMeshes.push(mesh);
  }
  // Rebuild occlusion mesh array (non-floor visible meshes for camera occlusion)
  occlusionMeshArray = stageMeshes.map(s => s.mesh).filter(m => m.visible);
  // 초기 nearCollisionMeshes 설정
  nearCollisionMeshes = collisionMeshes;
  console.log(`[Collision] Rebuilt: ${collisionMeshes.length} meshes`);
}

// =========================================================================
//  COLLISION-AWARE MOVEMENT
// =========================================================================
const _collisionRaycaster = new THREE.Raycaster();

function moveWithCollision(pos, displacement) {
  const rc = _collisionRaycaster;
  const checkDist = CHAR_RADIUS + COLLISION_MARGIN;

  _moveTarget.copy(pos).add(displacement);
  if (!checkCollisionAt(rc, _moveTarget, checkDist)) return _moveTarget.clone();

  // Step-up: if blocked, try moving with the test position slightly raised.
  // If that clears, the player can walk up small ledges (curbs, low steps).
  // Only attempt in market (house has indoor steps handled differently).
  if (currentMap === 'market') {
    const STEP_HEIGHT = 0.5;
    _moveTarget.copy(pos).add(displacement);
    _moveTarget.y += STEP_HEIGHT;
    if (!checkCollisionAt(rc, _moveTarget, checkDist)) {
      // Clear at stepped-up height — accept the XZ move; ground-snap will
      // resolve the Y next frame.
      const result = _moveTarget.clone();
      result.y = pos.y; // let ground raycast settle Y naturally
      return result;
    }
  }

  _moveXOnly.copy(pos);
  _moveXOnly.x += displacement.x;
  const canX = !checkCollisionAt(rc, _moveXOnly, checkDist);

  _moveZOnly.copy(pos);
  _moveZOnly.z += displacement.z;
  const canZ = !checkCollisionAt(rc, _moveZOnly, checkDist);

  // Try step-up on the single-axis fallbacks too
  if (currentMap === 'market' && !canX) {
    _moveXOnly.y += 0.5;
    if (!checkCollisionAt(rc, _moveXOnly, checkDist)) {
      _moveXOnly.y = pos.y;
      return _moveXOnly.clone();
    }
    _moveXOnly.y = pos.y;
  }
  if (currentMap === 'market' && !canZ) {
    _moveZOnly.y += 0.5;
    if (!checkCollisionAt(rc, _moveZOnly, checkDist)) {
      _moveZOnly.y = pos.y;
      return _moveZOnly.clone();
    }
    _moveZOnly.y = pos.y;
  }

  if (canX && canZ) {
    return Math.abs(displacement.x) >= Math.abs(displacement.z) ? _moveXOnly.clone() : _moveZOnly.clone();
  } else if (canX) {
    return _moveXOnly.clone();
  } else if (canZ) {
    return _moveZOnly.clone();
  }
  return pos.clone();
}

function checkCollisionAt(rc, testPos, checkDist) {
  _colOriginHigh.set(testPos.x, testPos.y + CHAR_HEIGHT, testPos.z);
  _colOriginLow.set(testPos.x, testPos.y + 0.15, testPos.z);
  const recursive = (currentMap !== 'market');

  for (let i = 0; i < NUM_COLLISION_RAYS; i++) {
    const angle = (i / NUM_COLLISION_RAYS) * Math.PI * 2;
    _colDir.set(Math.sin(angle), 0, Math.cos(angle));

    rc.set(_colOriginHigh, _colDir);
    rc.far = checkDist;
    if (rc.intersectObjects(nearCollisionMeshes, recursive).length > 0) return true;

    rc.set(_colOriginLow, _colDir);
    rc.far = checkDist;
    if (rc.intersectObjects(nearCollisionMeshes, recursive).length > 0) return true;
  }
  return false;
}

function pushOutOfCollision(pos) {
  const rc = _collisionRaycaster;
  const checkDist = CHAR_RADIUS;
  _colOriginHigh.set(pos.x, pos.y + CHAR_HEIGHT, pos.z);
  _colOriginLow.set(pos.x, pos.y + 0.15, pos.z);
  _colPushVec.set(0, 0, 0);
  let pushCount = 0;
  const recursive = (currentMap !== 'market');

  for (let i = 0; i < NUM_COLLISION_RAYS; i++) {
    const angle = (i / NUM_COLLISION_RAYS) * Math.PI * 2;
    _colDir.set(Math.sin(angle), 0, Math.cos(angle));

    rc.set(_colOriginHigh, _colDir);
    rc.far = checkDist;
    const hits = rc.intersectObjects(nearCollisionMeshes, recursive);
    if (hits.length > 0) {
      const penetration = checkDist - hits[0].distance;
      if (penetration > 0) {
        _colPushVec.x -= _colDir.x * penetration;
        _colPushVec.z -= _colDir.z * penetration;
        pushCount++;
      }
    }

    rc.set(_colOriginLow, _colDir);
    rc.far = checkDist;
    const hitsLow = rc.intersectObjects(nearCollisionMeshes, recursive);
    if (hitsLow.length > 0) {
      const penetration = checkDist - hitsLow[0].distance;
      if (penetration > 0) {
        _colPushVec.x -= _colDir.x * penetration;
        _colPushVec.z -= _colDir.z * penetration;
        pushCount++;
      }
    }
  }

  if (pushCount > 0) {
    let force = PUSHOUT_FORCE;
    if (pushCount >= STUCK_THRESHOLD) {
      force = PUSHOUT_FORCE * 2.5;
    }
    const pushLen = _colPushVec.length();
    if (pushLen > 0) {
      if (pushLen > force) {
        _colPushVec.multiplyScalar(force / pushLen);
      }
      pos.x += _colPushVec.x;
      pos.z += _colPushVec.z;
    }

    stuckFrames++;
    if (stuckFrames >= STUCK_TELEPORT_FRAMES && lastSafePos) {
      pos.x = lastSafePos.x;
      pos.z = lastSafePos.z;
      stuckFrames = 0;
      console.log('[Collision] Emergency teleport to safe position');
    }
  } else {
    stuckFrames = 0;
    if (!lastSafePos) lastSafePos = new THREE.Vector3();
    lastSafePos.copy(pos);
  }
}

// =========================================================================
//  DOOR SYSTEM
// =========================================================================
function setupDoors(scene) {
  const idToMesh = new Map();
  for (const { mesh, id } of stageMeshes) {
    idToMesh.set(id, mesh);
  }

  function getMeshInfo(id) {
    const mesh = idToMesh.get(id);
    if (!mesh) { console.warn(`[Door] Mesh #${id} not found!`); return null; }
    mesh.updateWorldMatrix(true, true);
    const box = new THREE.Box3().setFromObject(mesh);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    return { obj: mesh, box, size, center };
  }

  console.log('[Door] ===== Setup doors =====');

  for (const id of SINGLE_DOOR_IDS) {
    const info = getMeshInfo(id);
    if (!info) continue;
    const pivot = createDoorPivot(scene, info.obj, info.box, info.size, 'min');
    doorEntries.push({
      pivot,
      openAngle: Math.PI / 2,
      isOpen: false,
      animating: false,
      animTime: 0,
      animDir: 1,
      meshId: id
    });
    console.log(`[Door] Single #${id} "${info.obj.name}"`);
  }

  const doubleInfos = [];
  for (const id of DOUBLE_DOOR_IDS) {
    const info = getMeshInfo(id);
    if (info) doubleInfos.push({ id, ...info });
  }

  const paired = new Set();
  for (let i = 0; i < doubleInfos.length; i++) {
    if (paired.has(i)) continue;
    let bestJ = -1, bestDist = Infinity;
    for (let j = i + 1; j < doubleInfos.length; j++) {
      if (paired.has(j)) continue;
      const dist = doubleInfos[i].center.distanceTo(doubleInfos[j].center);
      if (dist < bestDist) { bestDist = dist; bestJ = j; }
    }
    if (bestJ >= 0) {
      const a = doubleInfos[i], b = doubleInfos[bestJ];
      const maxWidth = Math.max(Math.max(a.size.x, a.size.z), Math.max(b.size.x, b.size.z));
      if (bestDist < maxWidth * 3) {
        paired.add(i); paired.add(bestJ);
        const xThin = a.size.x < a.size.z;
        const sortAxis = xThin ? 'z' : 'x';
        const isALeft = a.center[sortAxis] < b.center[sortAxis];
        const left = isALeft ? a : b;
        const right = isALeft ? b : a;

        const pivotL = createDoorPivot(scene, left.obj, left.box, left.size, 'min');
        const pivotR = createDoorPivot(scene, right.obj, right.box, right.size, 'max');
        doorEntries.push({ pivot: pivotL, openAngle: Math.PI / 2, isOpen: false, animating: false, animTime: 0, animDir: 1, meshId: left.id });
        doorEntries.push({ pivot: pivotR, openAngle: -Math.PI / 2, isOpen: false, animating: false, animTime: 0, animDir: 1, meshId: right.id });
        continue;
      }
    }
    const info = doubleInfos[i];
    const pivot = createDoorPivot(scene, info.obj, info.box, info.size, 'min');
    doorEntries.push({ pivot, openAngle: Math.PI / 2, isOpen: false, animating: false, animTime: 0, animDir: 1, meshId: info.id });
  }

  console.log(`[Door] Total doors: ${doorEntries.length}`);
}

function createDoorPivot(scene, doorObj, box, size, hingeEdge) {
  const worldCenter = box.getCenter(new THREE.Vector3());
  const xThin = size.x < size.z;

  const hinge = worldCenter.clone();
  if (xThin) {
    hinge.z = hingeEdge === 'min' ? box.min.z : box.max.z;
  } else {
    hinge.x = hingeEdge === 'min' ? box.min.x : box.max.x;
  }
  hinge.y = box.min.y;

  doorObj.updateWorldMatrix(true, false);
  const doorWorldMatrix = doorObj.matrixWorld.clone();

  const pivot = new THREE.Group();
  pivot.name = doorObj.name + '_pivot';
  pivot.position.copy(hinge);
  scene.add(pivot);

  doorObj.parent.remove(doorObj);
  pivot.add(doorObj);

  pivot.updateWorldMatrix(true, false);
  const pivotWorldInv = new THREE.Matrix4().copy(pivot.matrixWorld).invert();
  const newLocal = doorWorldMatrix.clone().premultiply(pivotWorldInv);
  newLocal.decompose(doorObj.position, doorObj.quaternion, doorObj.scale);

  pivot.rotation.y = 0;
  return pivot;
}

init().catch(err => {
  console.error('Game init failed:', err);
});  </script>

},{passive:false});
}

tabBtn.addEventListener('touchstart',e=>{

},{passive:false});
}

},{passive:false});
}

}

if(screen.orientation?.lock){
try{
await screen.orientation.lock('landscape');
}catch(err){}
}
}catch(err){}

},{passive:false});
}
